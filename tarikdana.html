<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarik Dana</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
180deg,
#03132b 0%,
#06224a 40%,
#0b3f8d 100%
);

min-height:100vh;
padding:20px;
color:white;

}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:140px;
}

.saldo-box{

background:
linear-gradient(
135deg,
#00ff88,
#00c96a
);

padding:18px;
border-radius:18px;
margin-bottom:20px;

color:#03233e;

box-shadow:
0 10px 25px rgba(0,255,136,.25);

}

.saldo-box small{
display:block;
margin-bottom:5px;
}

.saldo-box h2{
font-size:28px;
}

.form{

background:
rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:20px;

padding:18px;

border:
1px solid rgba(255,255,255,.08);

}

.label{

font-size:13px;
margin-bottom:8px;
display:block;

}

.input{

width:100%;
height:55px;

border:none;

outline:none;

padding:0 15px;

border-radius:14px;

background:
rgba(255,255,255,.08);

color:white;

font-size:15px;

margin-bottom:15px;

}

.input::placeholder{
color:#aaa;
}

.bank-title{
margin-bottom:10px;
font-size:13px;
}

.bank-list{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

margin-bottom:15px;

}

.bank{

padding:14px;

border-radius:14px;

background:
rgba(255,255,255,.08);

text-align:center;

cursor:pointer;

border:1px solid transparent;

transition:.3s;

}

.bank.active{

border-color:#00ff88;

background:
rgba(0,255,136,.15);

}

.bank i{

display:block;

font-size:20px;

margin-bottom:5px;

color:#00ff88;

}

.btn{

width:100%;
height:55px;

border:none;

border-radius:15px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
135deg,
#00ff88,
#00c96a
);

color:#03233e;

box-shadow:
0 0 20px rgba(0,255,136,.35);

}

/* POPUP */

.popup{

position:fixed;
inset:0;

background:
rgba(0,0,0,.6);

display:flex;

justify-content:center;
align-items:center;

opacity:0;
visibility:hidden;

transition:.3s;

z-index:9999;

}

.popup.active{

opacity:1;
visibility:visible;

}

.popup-box{

width:90%;
max-width:340px;

background:white;

border-radius:22px;

padding:25px;

text-align:center;

color:#222;

animation:zoom .25s;

}

.popup-icon{

font-size:55px;

color:#00c96a;

margin-bottom:12px;

}

.popup-box h3{

margin-bottom:10px;

}

.popup-box p{

font-size:14px;
color:#666;

margin-bottom:20px;

line-height:1.5;

}

.popup-btns{

display:flex;
gap:10px;

}

.btn-batal{

flex:1;
height:45px;

border:none;

border-radius:12px;

background:#ddd;

font-weight:bold;

}

.btn-lanjut{

flex:1;
height:45px;

border:none;

border-radius:12px;

background:#00c96a;

color:white;

font-weight:bold;

}

@keyframes zoom{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

</style>
</head>
<body>

<div class="logo">
<img src="assets/logo.png">
</div>

<div class="saldo-box">

<small>Saldo Utama</small>

<h2 id="saldoUser">
Rp 0
</h2>

</div>

<div class="form">

<label class="label">
Nominal Tarik Dana
</label>

<input
type="number"
id="nominal"
class="input"
placeholder="Masukkan nominal">

<label class="label">
Atas Nama Rekening
</label>

<input
type="text"
id="namaRek"
class="input"
placeholder="Nama pemilik rekening">

<div class="bank-title">
Pilih Bank Tujuan
</div>

<div class="bank-list">

<div class="bank"
onclick="pilihBank(this,'BCA')">
<i class="fas fa-university"></i>
BCA
</div>

<div class="bank"
onclick="pilihBank(this,'BRI')">
<i class="fas fa-university"></i>
BRI
</div>

<div class="bank"
onclick="pilihBank(this,'BNI')">
<i class="fas fa-university"></i>
BNI
</div>

<div class="bank"
onclick="pilihBank(this,'MANDIRI')">
<i class="fas fa-university"></i>
MANDIRI
</div>

</div>

<label class="label">
Nomor Rekening Tujuan
</label>

<input
type="number"
id="rekening"
class="input"
placeholder="Masukkan nomor rekening">

<button
class="btn"
onclick="kirimWithdraw()">
Kirim Permintaan
</button>

</div>

<!-- POPUP 1 -->

<div id="popupKonfirmasi"
class="popup">

<div class="popup-box">

<i class="fas fa-circle-exclamation popup-icon"></i>

<h3>Konfirmasi Tarik Dana</h3>

<p>
Pastikan data rekening tujuan sudah benar.
Mohon dicek kembali sebelum melanjutkan.
</p>

<div class="popup-btns">

<button
class="btn-batal"
onclick="tutupPopup()">
Batal
</button>

<button
class="btn-lanjut"
onclick="prosesWithdraw()">
Lanjut
</button>

</div>

</div>

</div>

<!-- POPUP 2 -->

<div id="popupSukses"
class="popup">

<div class="popup-box">

<i class="fas fa-circle-check popup-icon"></i>

<h3>Permintaan Berhasil</h3>

<p>
Tarik dana telah dikirim.<br>
Proses pengiriman dana maksimal 1x24 jam.
</p>

<button
class="btn-lanjut"
style="width:100%;"
onclick="window.location.href='dashboard.html'">
Selesai
</button>

</div>

</div>

<script>

const currentUser =
localStorage.getItem("currentUser");

const user =
JSON.parse(
localStorage.getItem(currentUser)
);

document.getElementById("saldoUser")
.innerText =
"Rp " +
Number(user.saldo)
.toLocaleString("id-ID");

let bankTerpilih = "";

function pilihBank(el,nama){

document
.querySelectorAll(".bank")
.forEach(x=>x.classList.remove("active"));

el.classList.add("active");

bankTerpilih = nama;

}

function kirimWithdraw(){

const nominal =
Number(
document.getElementById("nominal").value
);

const rekening =
document.getElementById("rekening").value;

const namaRek =
document.getElementById("namaRek").value;

if(
!nominal ||
!rekening ||
!namaRek ||
!bankTerpilih
){
alert("Lengkapi data terlebih dahulu");
return;
}

if(nominal > user.saldo){

alert("Saldo tidak mencukupi");
return;
}

document
.getElementById("popupKonfirmasi")
.classList.add("active");

}

function tutupPopup(){

document
.getElementById("popupKonfirmasi")
.classList.remove("active");

}

function prosesWithdraw(){

const nominal =
Number(
document.getElementById("nominal").value
);

user.saldo -= nominal;

if(!user.riwayatWithdraw){
user.riwayatWithdraw = [];
}

user.riwayatWithdraw.unshift({

nominal:nominal,

bank:bankTerpilih,

rekening:
document.getElementById("rekening").value,

nama:
document.getElementById("namaRek").value,

tanggal:
new Date().toLocaleString("id-ID"),

status:"MENUNGGU"

});

localStorage.setItem(
currentUser,
JSON.stringify(user)
);

document
.getElementById("popupKonfirmasi")
.classList.remove("active");

document
.getElementById("popupSukses")
.classList.add("active");

}

</script>

</body>
</html>
