<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Saldo</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:18px;
}

.header img{
    width:40px;
}

/* CARD */
.card{
    margin:12px;
    padding:14px;
    background:#111b2e;
    border-radius:14px;
    border:1px solid #1f2a44;
}

/* SALDO */
.saldo{
    font-size:20px;
    font-weight:bold;
    color:#00ff88;
}

/* INPUT BOX */
.input-wrap{
    display:flex;
    align-items:center;
    margin-top:10px;
    border:1px solid #24324d;
    border-radius:12px;
    overflow:hidden;
    background:#0f172a;
}

.input-wrap span{
    padding:12px;
    color:#94a3b8;
    background:#0c1526;
}

input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    background:transparent;
    color:white;
    font-size:16px;
}

/* QUICK BUTTON */
.quick{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.quick button{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid #24324d;
    background:#0f172a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.quick button.active{
    border:2px solid #00ff88;
    color:#00ff88;
}

/* ALERT */
.alert{
    margin-top:10px;
    padding:10px;
    font-size:12px;
    border-radius:10px;
    background:#1f2937;
    color:#fbbf24;
    border-left:3px solid #fbbf24;
}

/* METHOD */
.method button{
    width:100%;
    margin-top:8px;
    padding:12px;
    border-radius:12px;
    background:#0f172a;
    border:1px solid #24324d;
    color:white;
    cursor:pointer;
}

.method button.active{
    border:2px solid #00ff88;
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#00ff88,#00c26a);
    color:#0b1220;
    font-weight:bold;
    cursor:pointer;
}

/* MINI LOADER PREMIUM */

.mini-loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:99999;

    opacity:0;
    visibility:hidden;
    transition:.3s;
}

.mini-loader.active{
    opacity:1;
    visibility:visible;
}

.mini-loader-box{
    text-align:center;
}

.loader-circle{
    position:relative;
    width:90px;
    height:90px;
    margin:auto;
}

.loader-circle::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.12);
}

.loader-circle::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:3px solid transparent;
    border-top:3px solid #00ff88;
    border-right:3px solid #00ff88;
    animation:rotateLoader .8s linear infinite;
}

.mini-logo{
    position:absolute;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:58px;
    height:58px;

    border-radius:50%;

    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,.12),
    rgba(255,255,255,.05)
    );

    backdrop-filter:blur(10px);

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
    0 0 20px rgba(0,255,136,.25);

    animation:pulseLogo 1.5s ease-in-out infinite;
}

.mini-logo img{
    width:70%;
    height:70%;
    object-fit:contain;
}

.mini-loader p{
    margin-top:18px;
    color:white;
    font-size:14px;
    letter-spacing:.5px;
}

@keyframes rotateLoader{
    100%{
        transform:rotate(360deg);
    }
}

@keyframes pulseLogo{
    0%,100%{
        transform:translate(-50%,-50%) scale(1);
    }

    50%{
        transform:translate(-50%,-50%) scale(1.08);
    }
}
    
/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box{
    width:80%;
    max-width:280px;
    background:white;
    color:black;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.modal-box button{
    margin-top:10px;
    padding:10px;
    border:none;
    background:#00ff88;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <img src="assets/logo.png">
    <h3>Top Up Saldo</h3>
</div>

<div class="card">
    <small>Saldo Anda</small>
    <div class="saldo" id="saldoUser">Rp 0</div>
</div>

<div class="card">
    <h4>Nominal Top Up</h4>

    <div class="input-wrap">
        <span>Rp</span>
        <input type="text" id="nominal" placeholder="15.000">
    </div>

    <div class="quick">
        <button onclick="setNominal(15000)">15K</button>
        <button onclick="setNominal(50000)">50K</button>
        <button onclick="setNominal(100000)">100K</button>
    </div>

    <div class="alert">
        ⚠ Minimal deposit Rp15.000
    </div>
</div>

<div class="card">
    <h4>Metode Pembayaran</h4>

    <div class="method">
        <button onclick="select(this,'QRIS')">QRIS (Rekomendasi)</button>
        <button onclick="select(this,'BRI')">BRI</button>
        <button onclick="select(this,'BCA')">BCA</button>
    </div>

    <button class="btn" onclick="submit()">Konfirmasi Top Up</button>
</div>

<div id="miniLoader" class="mini-loader">

    <div class="mini-loader-box">

        <div class="loader-circle">

            <div class="mini-logo">
                <img src="assets/logo.png">
            </div>

        </div>

        <p>Memuat...</p>

    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <div id="modalText"></div>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script>
let method = "";

// =========================
// LOAD USER (SAFE)
// =========================
function getUser(){
    let key = localStorage.getItem("currentUser");
    if(!key) return null;

    let data = localStorage.getItem(key);
    if(!data) return null;

    try{
        return JSON.parse(data);
    }catch(e){
        return null;
    }
}

let user = getUser();

if(user){
    document.getElementById("saldoUser").innerText =
    "Rp " + Number(user.saldo).toLocaleString("id-ID");
}

// =========================
// FORMAT INPUT RP
// =========================
const input = document.getElementById("nominal");

input.addEventListener("input", () => {
    let val = input.value.replace(/[^0-9]/g,"");
    input.value = val ? new Intl.NumberFormat("id-ID").format(val) : "";
});

// =========================
// QUICK NOMINAL
// =========================
function setNominal(val){
    input.value = new Intl.NumberFormat("id-ID").format(val);
}

// =========================
// METHOD SELECT
// =========================
function select(btn, m){
    method = m;

    document.querySelectorAll(".method button")
    .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
}

// =========================
// MODAL ALERT
// =========================
function show(text){
    document.getElementById("modalText").innerText = text;
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// =========================
// LOADER FIX (INI YANG PENTING)
// =========================
function showLoader(){
    document.getElementById("miniLoader").classList.add("active");
}

function hideLoader(){
    document.getElementById("miniLoader").classList.remove("active");
}

// =========================
// SUBMIT TOPUP (FIX FULL)
// =========================
function submit(){

    let nominal = parseInt(input.value.replace(/[^0-9]/g,""));

    if(!nominal || nominal < 15000){
        show("Minimal deposit Rp15.000");
        return;
    }

    if(!method){
        show("Pilih metode pembayaran");
        return;
    }

    showLoader();

    setTimeout(() => {

        hideLoader();

        let key = localStorage.getItem("currentUser");
        let user = JSON.parse(localStorage.getItem(key));

        if(!user){
            show("User tidak ditemukan");
            return;
        }

        localStorage.setItem("topupData", JSON.stringify({
            nominal,
            method,
            time: Date.now()
        }));

        window.location.href = "topup-process.html";

    }, 900);
}
</script>

</body>
</html>
