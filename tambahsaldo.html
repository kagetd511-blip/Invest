<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Saldo</title>

<style>

/* =========================
   GLOBAL PREMIUM BASE
========================= */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:
    radial-gradient(circle at top, #0b1a33 0%, #070b14 60%, #05070d 100%);
    color:white;
}

/* =========================
   HEADER PREMIUM
========================= */
.header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:18px 16px;

    background:rgba(15, 23, 42, .75);
    backdrop-filter:blur(18px);

    border-bottom:1px solid rgba(255,255,255,.06);
    box-shadow:0 10px 30px rgba(0,0,0,.45);

    position:sticky;
    top:0;
    z-index:50;
}

.header img{
    width:42px;
    filter:drop-shadow(0 6px 10px rgba(0,255,136,.15));
}

/* =========================
   CARD PREMIUM
========================= */
.card{
    margin:14px;
    padding:16px;

    background:linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.08);

    border-radius:18px;
    backdrop-filter:blur(18px);

    box-shadow:0 18px 45px rgba(0,0,0,.55);
}

/* =========================
   SALDO PREMIUM
========================= */
.saldo{
    font-size:22px;
    font-weight:800;
    color:#00ff88;
    text-shadow:0 0 12px rgba(0,255,136,.25);
}

/* =========================
   INPUT PREMIUM ULTRA
========================= */
.input-wrap{
    display:flex;
    align-items:center;

    margin-top:12px;
    border-radius:16px;
    overflow:hidden;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.06),
        rgba(255,255,255,.02)
    );

    border:1px solid rgba(255,255,255,.10);

    box-shadow:
        0 10px 30px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.05);
}

/* PREFIX / LABEL */
.input-wrap span{
    padding:12px 14px;

    font-size:12px;
    font-weight:600;
    letter-spacing:.3px;

    color:rgba(255,255,255,.75);

    background:rgba(255,255,255,.04);
    border-right:1px solid rgba(255,255,255,.08);
}

/* INPUT FIELD */
.input-wrap input{
    width:100%;
    padding:12px 14px;

    border:none;
    outline:none;

    background:transparent;
    color:white;
    font-size:15px;

    letter-spacing:.3px;
}

/* focus effect (halus tapi premium) */
.input-wrap:focus-within{
    border:1px solid rgba(0,255,136,.35);
    box-shadow:
        0 0 0 3px rgba(0,255,136,.08),
        0 12px 35px rgba(0,0,0,.4);
}

/* =========================
   QUICK BUTTON PREMIUM ULTRA
========================= */
.quick{
    display:flex;
    gap:10px;
    margin-top:10px;
}

/* BUTTON DEFAULT */
.quick button{
    flex:1;

    padding:10px 12px;

    border-radius:12px;

    border:1px solid rgba(255,255,255,.10);
    background:rgba(255,255,255,.03);

    color:rgba(255,255,255,.85);
    font-weight:600;
    font-size:13px;

    cursor:pointer;

    transition:.2s ease;

    box-shadow:0 6px 18px rgba(0,0,0,.25);
}

/* HOVER */
.quick button:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,.18);
    background:rgba(255,255,255,.06);
}

/* ACTIVE STATE PREMIUM */
.quick button.active{
    background:linear-gradient(
        135deg,
        rgba(0,255,136,.18),
        rgba(0,255,136,.06)
    );

    border:1px solid rgba(0,255,136,.5);
    color:#00ff88;

    box-shadow:
        0 10px 25px rgba(0,255,136,.15),
        inset 0 1px 0 rgba(255,255,255,.1);
}

/* =========================
   ALERT PREMIUM
========================= */
.alert{
    margin-top:12px;
    padding:10px 12px;

    font-size:12px;
    border-radius:12px;

    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);

    color:#fbbf24;
    border-left:3px solid #fbbf24;
}

/* =========================
   METHOD BUTTON ULTRA PREMIUM
========================= */
.method{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:10px;
}

/* BUTTON DEFAULT */
.method button{
    width:100%;
    padding:13px 14px;

    border-radius:14px;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.05),
        rgba(255,255,255,.02)
    );

    border:1px solid rgba(255,255,255,.10);

    color:rgba(255,255,255,.85);
    font-weight:600;
    font-size:14px;

    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:space-between;

    transition:.2s ease;

    box-shadow:0 10px 25px rgba(0,0,0,.35);
}

/* ICON / ARROW EFFECT OPTIONAL */
.method button::after{
    content:"›";
    font-size:18px;
    color:rgba(255,255,255,.35);
    transition:.2s;
}

/* HOVER */
.method button:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,.18);
    background:rgba(255,255,255,.06);
}

/* ACTIVE PREMIUM STATE */
.method button.active{
    border:1px solid rgba(0,255,136,.55);
    background:linear-gradient(
        135deg,
        rgba(0,255,136,.18),
        rgba(0,255,136,.06)
    );

    color:#00ff88;

    box-shadow:
        0 12px 30px rgba(0,255,136,.18),
        inset 0 1px 0 rgba(255,255,255,.1);
}

.method button.active::after{
    color:#00ff88;
    transform:translateX(2px);
}

/* =========================
   PRIMARY BUTTON PREMIUM
========================= */
.btn{
    width:100%;
    padding:14px;

    margin-top:15px;

    border:none;
    border-radius:16px;

    font-weight:800;
    font-size:15px;

    cursor:pointer;

    color:#04130c;

    background:linear-gradient(
        135deg,
        #00ff88,
        #00c26a
    );

    box-shadow:
        0 15px 35px rgba(0,255,136,.25),
        0 5px 15px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.35);

    transition:.2s ease;
}

/* HOVER LIFT EFFECT */
.btn:hover{
    transform:translateY(-2px);
    box-shadow:
        0 18px 45px rgba(0,255,136,.30),
        0 8px 20px rgba(0,0,0,.4);
}

/* CLICK EFFECT */
.btn:active{
    transform:translateY(0);
    box-shadow:
        0 10px 25px rgba(0,255,136,.2);
}

/* =========================
   MODAL PREMIUM FINAL (UPGRADED)
========================= */
.modal{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.7);
    backdrop-filter:blur(12px);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:999999;
}

.modal.show{
    display:flex;
}

/* BOX */
.modal-box{
    width:85%;
    max-width:340px;

    background:linear-gradient(135deg,#0f172a,#0b1220);
    border:1px solid rgba(255,255,255,.10);

    border-radius:20px;
    padding:22px;

    text-align:center;
    color:white;

    box-shadow:
        0 25px 70px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(255,255,255,.05);

    position:relative;
    overflow:hidden;
}

/* SUBTLE GLOW */
.modal-box::after{
    content:"";
    position:absolute;
    inset:-50%;

    background:radial-gradient(
        circle at top,
        rgba(0,255,136,.08),
        transparent 60%
    );

    pointer-events:none;
}

/* WARNING ICON (REPLACEMENT ⚡ → ⚠️ STYLE MODERN) */
.modal-box::before{
    content:"⚠";
    display:block;

    font-size:30px;
    margin-bottom:10px;

    color:#fbbf24;

    text-shadow:0 0 15px rgba(251,191,36,.25);
}

/* TEXT (optional kalau ada id modalText) */
.modal-box p{
    font-size:14px;
    color:rgba(255,255,255,.75);
    margin-bottom:15px;
    line-height:1.4;
}

/* BUTTON */
.modal-box button{
    width:100%;
    padding:12px;

    border:none;
    border-radius:14px;

    font-weight:800;
    cursor:pointer;

    background:linear-gradient(135deg,#00ff88,#00c26a);
    color:#04130c;

    box-shadow:
        0 12px 30px rgba(0,255,136,.25),
        inset 0 1px 0 rgba(255,255,255,.3);
}

/* BUTTON HOVER */
.modal-box button:hover{
    transform:translateY(-1px);
    box-shadow:0 16px 40px rgba(0,255,136,.3);
}

/* =========================
   MINI LOADER ULTRA PREMIUM
========================= */
.mini-loader{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.65);
    backdrop-filter:blur(18px);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:999999;

    opacity:0;
    visibility:hidden;
    transition:.35s ease;
}

.mini-loader.active{
    opacity:1;
    visibility:visible;
}

/* CENTER */
.mini-loader-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
}

/* =========================
   PREMIUM CLEAN LOADING RING (VISIBLE FIX)
========================= */
.loader-circle{
    position:relative;
    width:122px;
    height:122px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 30px 80px rgba(0,0,0,.7),
        0 0 25px rgba(0,255,136,.12);

    overflow:hidden;
}

/* RING JELAS & TEBAL */
.loader-circle::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;

    border:5px solid rgba(0,255,136,.15);
}

/* ARC YANG BERPUTAR (INI YANG “KEREN”) */
.loader-circle::after{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:50%;

    border:5px solid transparent;
    border-top:5px solid #00ff88;
    border-right:5px solid #00ff88;

    filter:drop-shadow(0 0 8px rgba(0,255,136,.6));

    animation:spinBig 0.9s cubic-bezier(.4,0,.2,1) infinite;
}

/* ANIMATION */
@keyframes spinBig{
    0%{
        transform:rotate(0deg) scale(1);
    }
    50%{
        transform:rotate(180deg) scale(1.05);
    }
    100%{
        transform:rotate(360deg) scale(1);
    }
}

/* =========================
   LOGO CENTER
========================= */
.mini-logo{
    position:relative;
    z-index:2;

    width:64px;
    height:64px;

    border-radius:18px;

    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 25px 60px rgba(0,0,0,.65),
        0 0 25px rgba(0,255,136,.22);

    animation:logoFloat 1.8s ease-in-out infinite;
}

.mini-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* =========================
   LUXURY PREMIUM LOADER TEXT
========================= */
.mini-loader p{
    margin:0;
    font-size:13px;
    letter-spacing:1px;

    display:inline-block;
    position:relative;

    /* gradient text mewah */
    background:linear-gradient(
        90deg,
        rgba(255,255,255,.85),
        rgba(0,255,140,.9),
        rgba(255,255,255,.85)
    );
    background-size:200% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    font-weight:500;

    /* glow elegan */
    filter:drop-shadow(0 0 10px rgba(0,255,140,.15));

    opacity:0;
    transform:translateY(8px);

    animation:
        fadeLuxury 0.7s ease forwards,
        shimmerText 3.5s ease-in-out infinite;
}

/* masuk halus premium */
@keyframes fadeLuxury{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* shimmer gradient slow (luxury feel) */
@keyframes shimmerText{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

/* =========================
   ANIMATION (SMOOTH LUXURY SPIN)
========================= */
@keyframes luxSpin{
    0%{
        transform:rotate(0deg);
        filter:blur(.3px) saturate(1.2);
    }
    50%{
        filter:blur(.6px) saturate(1.6);
    }
    100%{
        transform:rotate(360deg);
        filter:blur(.3px) saturate(1.2);
    }
}

@keyframes logoFloat{
    0%,100%{
        transform:translateY(0);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,.06),
            0 25px 60px rgba(0,0,0,.65),
            0 0 20px rgba(0,255,136,.18);
    }
    50%{
        transform:translateY(-3px);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,.08),
            0 35px 80px rgba(0,0,0,.75),
            0 0 35px rgba(0,255,136,.28);
    }
}
    
</style>
</head>

<body>

<div class="header">
    <img src="assets/logo.png">
    <h3>Top Up Saldo</h3>
</div>

<div class="card">
    <small>Saldo Anda</small>
    <div class="saldo" id="saldoUser">Rp 0</div>
</div>

<div class="card">
    <h4>Nominal Top Up</h4>

    <div class="input-wrap">
        <span>Rp</span>
        <input type="text" id="nominal" placeholder="15.000">
    </div>

    <div class="quick">
        <button onclick="setNominal(15000)">Rp15.000</button>
        <button onclick="setNominal(500000)">Rp500.000</button>
        <button onclick="setNominal(1000000)">Rp1.000.000</button>
    </div>

    <div class="alert">
        ⚠ Minimal Top Up saldo Rp15.000
    </div>
    <div class="alert">
        ⚠ Maksimal Top Up saldo Rp70.000.000
    </div>
</div>


<div class="card">
    <h4>Metode Pembayaran</h4>

    <div class="method">
        <button onclick="select(this,'QRIS')">QRIS (Rekomendasi)</button>

<button onclick="select(this,'BRI')">BRI</button>
<button onclick="select(this,'BCA')">BCA</button>
<button onclick="select(this,'BNI')">BNI</button>
<button onclick="select(this,'MANDIRI')">MANDIRI</button>
    </div>

    <button class="btn" onclick="submit()">Konfirmasi Top Up</button>
</div>

<div id="miniLoader" class="mini-loader">

    <div class="mini-loader-box">

        <div class="loader-circle">

            <div class="mini-logo">
                <img src="assets/logo.png">
            </div>

        </div>

        <p>Memuat...</p>

    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <div id="modalText"></div>
    </div>
</div>

<script src="utils.js"></script>
<script>
let method = "";

/* =========================
   LOAD USER (SAFE)
========================= */
function getUser(){
    let key = localStorage.getItem("currentUser");
    if(!key) return null;

    let data = localStorage.getItem(key);
    if(!data) return null;

    try{
        return JSON.parse(data);
    }catch(e){
        return null;
    }
}

let user = getUser();

if(user){
    document.getElementById("saldoUser").innerText =
    "Rp " + Number(user.saldo).toLocaleString("id-ID");
}

/* =========================
   FORMAT INPUT RP
========================= */
const input = document.getElementById("nominal");

input.addEventListener("input", () => {
    let val = input.value.replace(/[^0-9]/g,"");
    input.value = val ? new Intl.NumberFormat("id-ID").format(val) : "";
});

/* =========================
   QUICK NOMINAL
========================= */
function setNominal(val){
    input.value = new Intl.NumberFormat("id-ID").format(val);
}

/* =========================
   METHOD SELECT
========================= */
function select(btn, m){
    method = m;

    document.querySelectorAll(".method button")
    .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
}

/* =========================
   MODAL ALERT
========================= */
function showAlert(title, text, time = 1500){

    const modal = document.getElementById("modal");
    const box = document.getElementById("modalText");

    box.innerText = text;

    modal.classList.add("show");
    modal.style.display = "flex";

    clearTimeout(window.alertTimer);

    window.alertTimer = setTimeout(() => {
        modal.classList.remove("show");
        modal.style.display = "none";
    }, time);
}

/* =========================
   LOADER
========================= */
function showLoader(){
    document.getElementById("miniLoader").classList.add("active");
}

function hideLoader(){
    document.getElementById("miniLoader").classList.remove("active");
}

/* =========================
   SUBMIT TOPUP (SERVER VERSION)
========================= */
async function submit(){

    let nominal = parseInt(input.value.replace(/[^0-9]/g,""));

    if(!nominal || nominal < 15000){
        showAlert("Peringatan", "Minimal deposit Rp15.000");
        return;
    }

    if(nominal > 70000000){
        showAlert("Peringatan", "Maksimal deposit Rp70.000.000");
        return;
    }

    if(!method){
        showAlert("Peringatan", "Pilih metode pembayaran");
        return;
    }

    showLoader();

    try {

        let phone = localStorage.getItem("currentUser");

        let res = await fetch("https://invest-production-dfd6.up.railway.app/topup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                phone,
                nominal,
                method
            })
        });

        let data = await res.json();

        hideLoader();

        if(data.status){

           localStorage.setItem("topupData", JSON.stringify({
    topupId: data.topupId,
    phone: phone,
    nominal: nominal,
    method: method
}));

            // =========================
            // 🔥 KIRIM PESAN NOTIF
            // =========================
            sendMessage(
    "info",

`💳 PERMINTAAN TOP UP DITERIMA

━━━━━━━━━━━━━━

💰 Nominal    : Rp ${Number(nominal).toLocaleString("id-ID")}
🏦 Metode     : ${method}

━━━━━━━━━━━━━━

⏳ Status     : Menunggu Konfirmasi Admin
🔍 Verifikasi : Sedang Diproses

Pembayaran Anda telah berhasil dikirim ke sistem dan sedang menunggu proses verifikasi.

Saldo akan otomatis masuk ke akun setelah pembayaran berhasil dikonfirmasi oleh admin.

Terima kasih atas kepercayaan Anda.`
);

            // redirect
            window.location.href = "topup-process.html";

        } else {
            showAlert("Gagal", data.message);
        }

    } catch(err){
        hideLoader();
        showAlert("Error", "Server tidak merespon");
    }
}
</script>

</body>
</html>
