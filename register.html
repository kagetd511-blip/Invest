<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
<title>Daftar Akun</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

background:
linear-gradient(
180deg,
#03132b 0%,
#06224a 40%,
#0b3f8d 100%
);

overflow-x:hidden;
overflow-y:auto;
}

body::before{
content:"";
position:absolute;

width:300px;
height:300px;

background:#00ff88;

border-radius:50%;

filter:blur(120px);

top:-100px;
left:-100px;

opacity:.25;
}

body::after{
content:"";
position:absolute;

width:300px;
height:300px;

background:#008cff;

border-radius:50%;

filter:blur(120px);

bottom:-100px;
right:-100px;

opacity:.25;
}

  .custom-alert{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.65);

display:none;

justify-content:center;

align-items:center;

z-index:9999;

backdrop-filter:blur(8px);

}

.custom-alert.show{

display:flex;

animation:fadeIn .25s;
}

.alert-box{

width:90%;
max-width:340px;

background:
linear-gradient(
180deg,
#07152d,
#0d2450
);

border-radius:24px;

padding:25px;

text-align:center;

border:
1px solid rgba(255,255,255,.08);

box-shadow:
0 20px 50px rgba(0,0,0,.35);

}

.alert-icon{

width:70px;
height:70px;

margin:auto;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

background:
linear-gradient(
135deg,
#00ff88,
#00c95f
);

font-size:28px;

color:#03233e;

margin-bottom:15px;

}

.alert-box h3{

color:white;

margin-bottom:10px;

}

.alert-box p{

color:rgba(255,255,255,.75);

font-size:14px;

margin-bottom:20px;

}

.alert-box button{

width:100%;

height:48px;

border:none;

border-radius:14px;

font-weight:bold;

background:
linear-gradient(
135deg,
#00ff88,
#00c95f
);

color:#03233e;

cursor:pointer;

}

@keyframes fadeIn{

from{
opacity:0;
}

to{
opacity:1;
}

}

.register-card{

position:relative;
z-index:2;

width:100%;
max-width:430px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.1);

border-radius:30px;

padding:30px 25px;

box-shadow:
0 25px 60px rgba(0,0,0,.35);

}

.logo-box{

width:120px;
height:120px;

margin:auto;

background:
rgba(255,255,255,.08);

border-radius:25px;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

border:1px solid rgba(255,255,255,.1);

}

.logo-box img{

width:100%;
height:100%;

object-fit:contain;

padding:10px;

}

h2{

text-align:center;

color:white;

margin-top:18px;

font-size:28px;

}

.subtitle{

text-align:center;

color:rgba(255,255,255,.7);

margin-top:8px;

margin-bottom:25px;

}

.input-group{

margin-bottom:15px;

}

.input-group input{

width:100%;

height:55px;

padding:0 15px;

border:none;

outline:none;

border-radius:15px;

background:
rgba(255,255,255,.1);

color:white;

font-size:15px;

}

.input-group input::placeholder{

color:rgba(255,255,255,.6);

}

.password-box{

position:relative;

}

.password-box input{

padding-right:55px;

}

.password-box span{

position:absolute;

right:18px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

font-size:18px;

color:rgba(255,255,255,.8);

transition:.3s;

}

.password-box span:hover{

color:#00ff88;

}

.register-btn{

width:100%;

height:55px;

border:none;

border-radius:15px;

cursor:pointer;

font-size:16px;

font-weight:700;

background:
linear-gradient(
135deg,
#00ff88,
#00c95f
);

color:#03233e;

margin-top:10px;

}

.login-link{

text-align:center;

margin-top:20px;

color:white;

}

.login-link a{

color:#00ff88;

text-decoration:none;

font-weight:bold;

}

      /* LOADING PREMIUM */

.loading-screen{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:
linear-gradient(
180deg,
rgba(3,19,43,.95),
rgba(6,34,74,.97),
rgba(11,63,141,.98)
);

display:flex;
justify-content:center;
align-items:center;

z-index:999999;

opacity:0;
visibility:hidden;

transition:.35s;
}

.loading-screen.active{

opacity:1;
visibility:visible;

}

.loading-content{

text-align:center;

}

.loading-logo{

width:120px;
height:120px;

margin:auto;

border-radius:30px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(20px);

display:flex;
align-items:center;
justify-content:center;

border:
1px solid rgba(255,255,255,.1);

box-shadow:
0 0 40px rgba(0,255,136,.35);

animation:pulse 1.8s infinite;

}

.loading-logo img{

width:85%;
height:85%;

object-fit:contain;

}

.loading-spinner{

width:60px;
height:60px;

margin:25px auto;

border-radius:50%;

border:4px solid
rgba(255,255,255,.15);

border-top:
4px solid #00ff88;

animation:spin 1s linear infinite;

}

.loading-content h3{

color:white;
font-size:20px;

margin-bottom:8px;

}

.loading-content p{

color:rgba(255,255,255,.7);

font-size:14px;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

@keyframes pulse{

0%{
transform:scale(1);
box-shadow:
0 0 20px rgba(0,255,136,.25);
}

50%{
transform:scale(1.05);
box-shadow:
0 0 50px rgba(0,255,136,.6);
}

100%{
transform:scale(1);
box-shadow:
0 0 20px rgba(0,255,136,.25);
}

}

/* MINI LOADER PREMIUM */

.mini-loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:99999;

    opacity:0;
    visibility:hidden;
    transition:.3s;
}

.mini-loader.active{
    opacity:1;
    visibility:visible;
}

.mini-loader-box{
    text-align:center;
}

.loader-circle{
    position:relative;
    width:90px;
    height:90px;
    margin:auto;
}

.loader-circle::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.12);
}

.loader-circle::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:3px solid transparent;
    border-top:3px solid #00ff88;
    border-right:3px solid #00ff88;
    animation:rotateLoader .8s linear infinite;
}

.mini-logo{
    position:absolute;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:58px;
    height:58px;

    border-radius:50%;

    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,.12),
    rgba(255,255,255,.05)
    );

    backdrop-filter:blur(10px);

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
    0 0 20px rgba(0,255,136,.25);

    animation:pulseLogo 1.5s ease-in-out infinite;
}

.mini-logo img{
    width:70%;
    height:70%;
    object-fit:contain;
}

.mini-loader p{
    margin-top:18px;
    color:white;
    font-size:14px;
    letter-spacing:.5px;
}

@keyframes rotateLoader{
    100%{
        transform:rotate(360deg);
    }
}

@keyframes pulseLogo{
    0%,100%{
        transform:translate(-50%,-50%) scale(1);
    }

    50%{
        transform:translate(-50%,-50%) scale(1.08);
    }
}

</style>

</head>
<body><div class="register-card"><div class="logo-box">
<img src="assets/logo.png" alt="Logo">
</div><h2>Daftar Akun</h2><p class="subtitle">
Lengkapi data untuk membuat akun
</p>

  <div id="customAlert" class="custom-alert">

    <div class="alert-box">
      
        <h3 id="alertTitle">
            Informasi
        </h3>

        <p id="alertMessage">
            Pesan disini
        </p>

        <button onclick="closeAlert()">
            Oke
        </button>

    </div>

</div>
  
<div class="input-group">
<input
type="text"
id="username"
placeholder="Username">
</div>
<div class="input-group">
<input
type="tel"
id="phone"
placeholder="Nomor HP">
</div><div class="input-group">
<input
type="email"
id="email"
placeholder="Email (Opsional)">
</div><div class="input-group">
<div class="password-box"><input
type="password"
id="password"
placeholder="Sandi">

<span onclick="togglePassword()" id="eyeIcon">
<i class="fa-solid fa-eye"></i>
</span>

</div>
</div><div class="input-group">
<div class="password-box"><input
type="password"
id="confirmPassword"
placeholder="Ulangi Sandi">


</div>
</div><div class="input-group">
<input
type="text"
id="referral"
placeholder="Kode Referral">
</div><button
class="register-btn"
onclick="register()">
Buat Akun
</button>

<p class="login-link">
Sudah punya akun?
<a href="#"
onclick="goLogin();return false;">
Login
</a>
</p></div>

   <div id="loadingScreen" class="loading-screen">

    <div class="loading-content">

        <div class="loading-logo">
            <img src="assets/logo.png">
        </div>

        <div class="loading-spinner"></div>

        <h3>Memproses Pendaftaran</h3>

        <p>Mohon tunggu sebentar...</p>

    </div>

</div>

    <div id="miniLoader" class="mini-loader">

    <div class="mini-loader-box">

        <div class="loader-circle">

            <div class="mini-logo">
                <img src="assets/logo.png">
            </div>

        </div>

        <p>Memuat...</p>

    </div>

</div>
  
  <script>

function togglePassword(id){

let input =
document.getElementById(id);

if(input.type === "password"){

input.type = "text";

}else{

input.type = "password";

}

}

</script><script src="register.js"></script></body>
</html>
