<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
<title>Daftar Akun</title>
  
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

/* =========================
   BODY ULTRA PREMIUM BACKGROUND
========================= */
body{
    min-height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    background:
        radial-gradient(circle at top, #0a1f44 0%, #03132b 35%, #020617 100%);

    overflow-y:auto;
}

/* =========================
   FLOATING GLOW ORB 1
========================= */
body::before{
    content:"";
    position:absolute;

    width:300px;
    height:300px;

    background:radial-gradient(circle, #00ff88 0%, transparent 70%);
    border-radius:50%;

    filter:blur(120px);

    top:-100px;
    left:-100px;

    opacity:.22;

    animation:float1 10s ease-in-out infinite;
}

/* =========================
   FLOATING GLOW ORB 2
========================= */
body::after{
    content:"";
    position:fixed;

    width:420px;
    height:420px;

    background:radial-gradient(circle, #008cff 0%, transparent 70%);
    border-radius:50%;

    filter:blur(130px);

    bottom:-140px;
    right:-140px;

    opacity:.22;

    animation:float2 12s ease-in-out infinite;
}

/* =========================
   ANIMATION GLOW MOVE
========================= */
@keyframes float1{
    0%,100%{
        transform:translate(0,0) scale(1);
    }
    50%{
        transform:translate(40px,30px) scale(1.08);
    }
}

@keyframes float2{
    0%,100%{
        transform:translate(0,0) scale(1);
    }
    50%{
        transform:translate(-40px,-30px) scale(1.1);
    }
}

/* =========================
   CUSTOM ALERT ULTRA PREMIUM
========================= */
.custom-alert{
    position:fixed;
    inset:0;

    display:none;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.55);
    backdrop-filter:blur(12px);

    z-index:9999;

    padding:20px;
}

.custom-alert.show{
    display:flex;
    animation:fadeInBg .25s ease;
}

/* =========================
   ALERT BOX PREMIUM
========================= */
.alert-box{
    width:90%;
    max-width:340px;

    background:linear-gradient(180deg,#081a33,#0b1f3f);

    border-radius:22px;

    padding:26px 22px;

    text-align:center;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 25px 70px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.05);

    position:relative;
    overflow:hidden;

    animation:popUp .28s ease;
}

/* soft glow background */
.alert-box::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    pointer-events: none;

    background:radial-gradient(circle,rgba(0,255,136,.12),transparent 60%);
    transform:rotate(20deg);
}

/* =========================
   ICON PREMIUM
========================= */
.alert-icon{
    width:72px;
    height:72px;

    margin:auto;

    border-radius:18px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(135deg,#00ff88,#22c55e);

    font-size:30px;
    color:#04130c;

    margin-bottom:14px;

    box-shadow:
        0 15px 35px rgba(0,255,136,.25),
        inset 0 1px 0 rgba(255,255,255,.35);
}

/* =========================
   TEXT
========================= */
.alert-box h3{
    color:#ffffff;
    margin-bottom:8px;
    font-size:16px;
    font-weight:800;
}

.alert-box p{
    color:rgba(255,255,255,.75);
    font-size:14px;
    margin-bottom:18px;
    line-height:1.5;
}

/* =========================
   ALERT BUTTON PREMIUM (COMPACT)
========================= */
.alert-box button{
    width:100%;
    height:42px;

    border:none;
    border-radius:12px;

    font-weight:800;
    font-size:14px;

    background:linear-gradient(135deg,#00ff88,#00c95f);
    color:#04130c;

    cursor:pointer;

    box-shadow:
        0 12px 25px rgba(0,255,136,.22),
        inset 0 1px 0 rgba(255,255,255,.35);

    transition:.2s ease;

    letter-spacing:.3px;
}

.alert-box button:hover{
    transform:translateY(-1px);
    box-shadow:
        0 16px 30px rgba(0,255,136,.28),
        inset 0 1px 0 rgba(255,255,255,.4);
}

.alert-box button:active{
    transform:scale(.98);
}

/* =========================
   ANIMATION
========================= */
@keyframes fadeInBg{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes popUp{
    from{
        transform:scale(.9);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* =========================
   Registrasi CARD ULTRA PREMIUM
========================= */
.register-card{
    position:relative;
    z-index:2;

    width:100%;
    max-width:420px;

    background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.05));
    backdrop-filter:blur(28px);

    border:1px solid rgba(255,255,255,.12);
    border-radius:28px;

    padding:32px 24px;

    box-shadow:
        0 30px 80px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.05);

    overflow:hidden;
}

/* glow layer */
.register-card::before{
    content:"";
    position:absolute;
    inset:-40%;

    background:radial-gradient(circle at top,#00ff88 0%,transparent 55%);
    opacity:.12;

    pointer-events:none;
}

/* =========================
   LOGO BOX PREMIUM
========================= */
.logo-box{
    width:110px;
    height:110px;

    margin:0 auto;

    background:rgba(255,255,255,.06);
    border-radius:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
        0 15px 35px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.05);
}

.logo-box img{
    width:100%;
    height:100%;
    object-fit:contain;

    padding:12px;
}

/* =========================
   TITLE
========================= */
h2{
    text-align:center;
    color:white;

    margin-top:16px;
    font-size:26px;
    font-weight:800;

    letter-spacing:.3px;
}

/* =========================
   SUBTITLE
========================= */
.subtitle{
    text-align:center;
    color:rgba(255,255,255,.72);

    margin-top:8px;
    margin-bottom:22px;

    font-size:14px;
    line-height:1.4;
}

/* =========================
   INPUT GROUP PREMIUM + ANIMASI
========================= */
.input-group{
    margin-bottom:14px;
    position:relative;
}

/* INPUT FIELD */
.input-group input{
    width:100%;
    height:52px;

    border:none;
    outline:none;

    border-radius:14px;

    padding:0 15px;

    background:rgba(255,255,255,.06);
    color:white;

    font-size:15px;

    border:1px solid rgba(255,255,255,.10);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04);

    transition:.25s ease;
}

/* PLACEHOLDER */
.input-group input::placeholder{
    color:rgba(255,255,255,.55);
}

/* FOCUS PREMIUM GLOW */
.input-group input:focus{
    border-color:#00ff88;
    box-shadow:
        0 0 0 3px rgba(0,255,136,.12),
        0 10px 25px rgba(0,255,136,.10);
    transform:translateY(-1px);
}

/* ANIMASI HALUS SAAT MUNCUL */
.input-group{
    animation:inputFade .35s ease both;
}

/* delay effect kalau dipakai berurutan */
.input-group:nth-child(1){ animation-delay:.05s; }
.input-group:nth-child(2){ animation-delay:.10s; }
.input-group:nth-child(3){ animation-delay:.15s; }

@keyframes inputFade{
    from{
        opacity:0;
        transform:translateY(8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   PASSWORD BOX PREMIUM + ANIMASI
========================= */
.password-box{
    position:relative;
    margin-bottom:14px;
}

/* INPUT STYLE (biar konsisten premium) */
.password-box input{
    width:100%;
    height:52px;

    border:none;
    outline:none;

    border-radius:14px;

    padding:0 55px 0 15px;

    background:rgba(255,255,255,.06);
    color:white;

    font-size:15px;

    border:1px solid rgba(255,255,255,.10);

    transition:.25s ease;

    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}

/* FOCUS GLOW */
.password-box input:focus{
    border-color:#00ff88;
    box-shadow:
        0 0 0 3px rgba(0,255,136,.12),
        0 10px 25px rgba(0,255,136,.10);
    transform:translateY(-1px);
}

/* ICON TOGGLE */
.password-box span{
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);

    cursor:pointer;

    font-size:18px;
    color:rgba(255,255,255,.7);

    padding:6px;
    border-radius:10px;

    transition:.25s ease;

    user-select:none;
}

/* HOVER PREMIUM */
.password-box span:hover{
    color:#00ff88;
    background:rgba(0,255,136,.08);
    box-shadow:0 0 15px rgba(0,255,136,.15);
}

/* CLICK FEEL (kalau span ditekan via JS toggle class .active) */
.password-box span.active{
    color:#00ff88;
    transform:translateY(-50%) scale(1.1);
    background:rgba(0,255,136,.12);
}

/* =========================
   LOGIN BUTTON ULTRA PREMIUM + ANIMASI
========================= */
.register-btn{
    width:100%;
    height:52px;

    border:none;
    border-radius:14px;

    cursor:pointer;

    font-size:15px;
    font-weight:800;

    background:linear-gradient(135deg,#00ff88,#00c95f);
    color:#04130c;

    margin-top:10px;

    transition:.25s ease;

    position:relative;
    overflow:hidden;

    letter-spacing:.3px;
}

/* HOVER PREMIUM LIFT */
.register-btn:hover{
    transform:translateY(-2px);
    box-shadow:
        0 20px 45px rgba(0,255,136,.30),
        inset 0 1px 0 rgba(255,255,255,.4);
}

/* CLICK EFFECT */
.register-btn:active{
    transform:scale(.98);
}

/* SHINE ANIMATION */
.register-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;

    width:60%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.35),
        transparent
    );

    transform:skewX(-20deg);
}

/* ANIMASI SHINE LOOP */
.register-btn:hover::before{
    animation:shine 1.2s ease;
}

@keyframes shine{
    0%{ left:-120%; }
    100%{ left:120%; }
}

/* =========================
   LOGIN LINK PREMIUM
========================= */
.login-link{
    text-align:center;
    margin-top:20px;
    color:rgba(255,255,255,.75);
    font-size:14px;

    animation:fadeUp .6s ease;
}

/* LINK */
.login-link a{
    color:#00ff88;
    text-decoration:none;
    font-weight:700;

    position:relative;
    display:inline-block;

    transition:.25s ease;
}

/* hover glow + naik sedikit */
.login-link a:hover{
    color:#22c55e;
    transform:translateY(-2px);
    text-shadow:0 0 12px rgba(0,255,136,.35);
}

/* underline animasi */
.login-link a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-3px;

    width:100%;
    height:2px;

    background:linear-gradient(90deg,#00ff88,#22c55e);

    transform:scaleX(0);
    transform-origin:left;

    transition:.25s ease;
}

.login-link a:hover::after{
    transform:scaleX(1);
}

/* ANIMASI MUNCUL */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   LOADING SCREEN ULTRA LUXURY
========================= */
.loading-screen{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:999999;

    background:
        radial-gradient(circle at 20% 20%, rgba(0,255,136,.10), transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(0,140,255,.12), transparent 50%),
        linear-gradient(180deg,#020b1a,#061a3a,#0b2f66);

    opacity:0;
    visibility:hidden;
    transition:.4s ease;
}

.loading-screen.active{
    opacity:1;
    visibility:visible;
}

/* =========================
   CENTER WRAPPER
========================= */
.loading-content{
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
}

/* =========================
   PREMIUM LOGO FRAME
========================= */
.loading-logo{
    width:122px;
    height:122px;

    border-radius:26px;

    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.05);
    backdrop-filter:blur(24px);

    border:1px solid rgba(255,255,255,.10);

    box-shadow:
        0 30px 80px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(255,255,255,.06);

    overflow:hidden;
}

/* LOGO */
.loading-logo img{
    width:76%;
    height:76%;
    object-fit:contain;
    z-index:2;

    filter:drop-shadow(0 8px 18px rgba(0,0,0,.4));
}

/* =========================
   LUXURY FRAME RING (FOLLOW SHAPE)
========================= */
.loading-logo::before{
    content:"";
    position:absolute;
    inset:-3px;

    border-radius:28px;

    background:conic-gradient(
        from 0deg,
        transparent 0%,
        #00ff88 15%,
        transparent 35%,
        #00cfff 55%,
        transparent 75%,
        #00ff88 100%
    );

    animation:luxSpin 1.2s linear infinite;

    filter:blur(.3px);
    opacity:.9;
}

/* INNER SOFT GLOW */
.loading-logo::after{
    content:"";
    position:absolute;
    inset:6px;

    border-radius:20px;

    background:
        radial-gradient(circle at center,
        rgba(0,255,136,.12),
        transparent 60%);

    animation:breath 2s ease-in-out infinite;
}

/* =========================
   TEXT
========================= */
.loading-content h3{
    color:#ffffff;
    font-size:18px;
    font-weight:700;
    letter-spacing:.4px;
}

.loading-content p{
    color:rgba(255,255,255,.65);
    font-size:13px;
}

/* =========================
   ANIMATION
========================= */
@keyframes luxSpin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

@keyframes breath{
    0%,100%{ opacity:.6; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.05); }
}

/* =========================
   MINI LOADER ULTRA PREMIUM
========================= */
.mini-loader{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.65);
    backdrop-filter:blur(16px);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:999999;

    opacity:0;
    visibility:hidden;
    transition:.35s ease;
}

.mini-loader.active{
    opacity:1;
    visibility:visible;
}

/* CENTER WRAPPER */
.mini-loader-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
}

/* =========================
   LOADER FRAME (PREMIUM GLASS BOX)
========================= */
.loader-circle{
    position:relative;

    width:112px;
    height:112px;

    border-radius:26px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 30px 80px rgba(0,0,0,.65),
        0 0 40px rgba(0,255,136,.10);

    overflow:hidden;
}

/* OUTER PREMIUM FLOW RING */
.loader-circle::before{
    content:"";
    position:absolute;
    inset:-2px;

    border-radius:28px;

    background:conic-gradient(
        from 0deg,
        #00ff88,
        #22c55e,
        #00c95f,
        transparent 70%
    );

    animation:spinFlow 1s linear infinite;

    filter:blur(.4px);
    opacity:.9;
}

/* INNER GLASS CUT */
.loader-circle::after{
    content:"";
    position:absolute;
    inset:3px;

    border-radius:22px;

    background:linear-gradient(180deg,#081a33,#0b1f3f);
}

/* =========================
   LOGO CENTER
========================= */
.mini-logo{
    position:relative;
    z-index:2;

    width:62px;
    height:62px;

    border-radius:18px;

    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 18px 40px rgba(0,0,0,.55),
        0 0 25px rgba(0,255,136,.25);

    animation:logoPulse 1.5s ease-in-out infinite;
}

.mini-logo img{
    width:75%;
    height:75%;
    object-fit:contain;
}

/* TEXT */
.mini-loader p{
    margin:0;
    font-size:13px;
    color:rgba(255,255,255,.85);
    letter-spacing:.5px;
}

/* =========================
   ANIMATION
========================= */
@keyframes spinFlow{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

@keyframes logoPulse{
    0%,100%{
        transform:scale(1);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,.05),
            0 18px 40px rgba(0,0,0,.55),
            0 0 20px rgba(0,255,136,.18);
    }
    50%{
        transform:scale(1.05);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,.08),
            0 25px 55px rgba(0,0,0,.7),
            0 0 45px rgba(0,255,136,.35);
    }
}

</style>

</head>
<body><div class="register-card"><div class="logo-box">
<img src="assets/logo.png" alt="Logo">
</div><h2>Daftar Akun</h2><p class="subtitle">
Lengkapi data untuk membuat akun
</p>

  <div id="customAlert" class="custom-alert">

    <div class="alert-box">
      
        <h3 id="alertTitle">
            Informasi
        </h3>

        <p id="alertMessage">
            Pesan disini
        </p>

        <button onclick="closeAlert()">
            Oke
        </button>

    </div>

</div>
  
<div class="input-group">
<input
type="text"
id="username"
placeholder="Username">
</div>
<div class="input-group">
<input
type="tel"
id="phone"
placeholder="Nomor HP">
</div><div class="input-group">
<input
type="email"
id="email"
placeholder="Email (Opsional)">
</div><div class="input-group">
<div class="password-box"><input
type="password"
id="password"
placeholder="Sandi">

<span onclick="togglePassword()" id="eyeIcon">
<i class="fa-solid fa-eye"></i>
</span>

</div>
</div><div class="input-group">
<div class="password-box"><input
type="password"
id="confirmPassword"
placeholder="Ulangi Sandi">


</div>
</div><div class="input-group">
<input
type="text"
id="referral"
placeholder="Kode Referral">
</div><button
class="register-btn"
onclick="register()">
Buat Akun
</button>

<p class="login-link">
Sudah punya akun?
<a href="#"
onclick="goLogin();return false;">
Login
</a>
</p></div>

   <div id="loadingScreen" class="loading-screen">

    <div class="loading-content">

        <div class="loading-logo">
            <img src="assets/logo.png">
        </div>

        <div class="loading-spinner"></div>

        <h3>Memproses Pendaftaran</h3>

        <p>Mohon tunggu sebentar...</p>

    </div>

</div>

    <div id="miniLoader" class="mini-loader">

    <div class="mini-loader-box">

        <div class="loader-circle">

            <div class="mini-logo">
                <img src="assets/logo.png">
            </div>

        </div>

        <p>Memuat...</p>

    </div>

</div>
  
  <script>

function togglePassword(id){

let input =
document.getElementById(id);

if(input.type === "password"){

input.type = "text";

}else{

input.type = "password";

}

}

</script><script src="register.js"></script></body>
</html>
