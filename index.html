<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertamina</title>
 
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    background:
    radial-gradient(
        circle at top,
        #0d6fd3 0%,
        #005BAC 45%,
        #003d73 100%
    );
}

.splash{
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    position:relative;
    padding-bottom:60px;
}

/* CAHAYA BELAKANG LOGO */

.splash::before{
    content:"";
    position:absolute;

    width:320px;
    height:320px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(255,255,255,.12),
        transparent 70%
    );

    top:50%;
    left:50%;

    transform:
    translate(-50%,-55%);

    pointer-events:none;
}

/* ========================= */
/* LOGO */
/* ========================= */

.logo-container{
    position:relative;
    width:300px;
    height:140px;

    animation:float 3s ease-in-out infinite;
}

.logo{
    position:absolute;
    top:30%;
    left:50%;
    transform:translate(-50%,-50%);
}

.logo-icon{
    width:90px;
    opacity:1;

    filter:
    drop-shadow(0 0 20px rgba(255,255,255,.25))
    drop-shadow(0 0 40px rgba(255,255,255,.15));
}

.logo-text{
    width:260px;
    opacity:0;

    filter:
    drop-shadow(0 0 20px rgba(255,255,255,.25))
    drop-shadow(0 0 40px rgba(255,255,255,.15));
}

/* ========================= */
/* LOADING */
/* ========================= */

.loading{
    width:240px;
    height:6px;

    margin-top:15px;

    border-radius:50px;
    overflow:hidden;

    background:rgba(255,255,255,.15);

    box-shadow:
    inset 0 0 10px rgba(255,255,255,.1);
}

.loading-bar{
    width:0;
    height:100%;

    background:
    linear-gradient(
        90deg,
        #00e5ff,
        #ffffff,
        #00ff88
    );

    box-shadow:
    0 0 20px rgba(255,255,255,.5);
}

/* ========================= */
/* FOOTER */
/* ========================= */

.footer{
    position:absolute;

    bottom:max(
        25px,
        env(safe-area-inset-bottom)
    );

    left:0;

    width:100%;

    text-align:center;
    color:#fff;
}

.footer-logo{
    display:flex;
    justify-content:center;
    align-items:center;

    gap:18px;

    margin-bottom:12px;
}

.footer-logo img{
    max-height:32px;
    max-width:120px;
    object-fit:contain;

    filter:
    drop-shadow(
        0 0 10px
        rgba(255,255,255,.15)
    );
}

.footer-text{
    font-size:12px;
    opacity:.8;
    line-height:1.6;
    letter-spacing:.3px;
}

/* ========================= */
/* ANIMATION */
/* ========================= */

.show-text{
    animation:textShow .8s forwards;
}

.hide-icon{
    animation:iconHide .8s forwards;
}

.load{
    animation:loadBar 4s linear forwards;
}

@keyframes float{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }

}

@keyframes iconHide{

    from{
        opacity:1;
        transform:
        translate(-50%,-50%)
        scale(1);
    }

    to{
        opacity:0;
        transform:
        translate(-50%,-50%)
        scale(1.8);
    }

}

@keyframes textShow{

    from{
        opacity:0;
        transform:
        translate(-50%,-50%)
        scale(.7);
    }

    to{
        opacity:1;
        transform:
        translate(-50%,-50%)
        scale(1);
    }

}

@keyframes loadBar{

    from{
        width:0%;
    }

    to{
        width:100%;
    }

}

</style>
</head>
<body>

<div class="splash">

    <div class="logo-container">

        <!-- Logo Pertamina Icon -->
        <img
        src="assets/pertamina-icon.png"
        class="logo logo-icon"
        id="logoIcon">

        <!-- Logo Tulisan Pertamina -->
        <img
        src="assets/pertamina-teks.png"
        class="logo logo-text"
        id="logoText">

    </div>

    <div class="loading">
        <div class="loading-bar" id="loadingBar"></div>
    </div>

    <div class="footer">

        <div class="footer-logo">

            <img src="assets/danantara.png">

            <img src="assets/bumn.png">

        </div>

        <div class="footer-text">
            PT Pertamina (Persero)<br>
            Bagian dari Danantara Indonesia dan BUMN Untuk Indonesia
        </div>

    </div>

</div>

<script>

const logoIcon = document.getElementById("logoIcon");
const logoText = document.getElementById("logoText");
const loadingBar = document.getElementById("loadingBar");

/* Logo Icon tampil 1.5 detik */
setTimeout(()=>{

    logoIcon.classList.add("hide-icon");

    setTimeout(()=>{

        logoText.classList.add("show-text");

        loadingBar.classList.add("load");

    },400);

},1500);

/* Redirect */
setTimeout(()=>{

    window.location.href="login.html";

},6000);

</script>

</body>
</html>
