<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertamina</title>
 
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    background:
    radial-gradient(circle at top,
    #1e90ff 0%,
    #005BAC 35%,
    #00386d 70%,
    #001d3d 100%);
}

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    z-index:0;
}

body::before{
    width:250px;
    height:250px;
    background:rgba(0,255,255,.25);
    top:-50px;
    left:-50px;
}

body::after{
    width:300px;
    height:300px;
    background:rgba(255,255,255,.15);
    bottom:-100px;
    right:-100px;
}

.splash{
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    position:relative;
    padding-bottom:60px;
}

/* CAHAYA BELAKANG LOGO */

.splash::before{
    content:"";
    position:absolute;

    width:320px;
    height:320px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(255,255,255,.12),
        transparent 70%
    );

    top:50%;
    left:50%;

    transform:
    translate(-50%,-55%);

    pointer-events:none;
}

/* ========================= */
/* LOGO */
/* ========================= */

.logo-container{
    position:relative;
    width:300px;
    height:140px;

    animation:float 3s ease-in-out infinite;
}

.logo{
    position:absolute;
    top:30%;
    left:50%;
    transform:translate(-50%,-50%);
}

.logo-icon{
    width:100px;

    filter:
    drop-shadow(0 0 20px rgba(255,255,255,.3))
    drop-shadow(0 0 40px rgba(0,229,255,.5))
    drop-shadow(0 0 80px rgba(0,229,255,.35));
}

.logo-text{
    width:280px;
    opacity:0;

    filter:
    drop-shadow(0 0 20px rgba(255,255,255,.25))
    drop-shadow(0 0 40px rgba(255,255,255,.15));
}

/* ========================= */
/* LOADING */
/* ========================= */

.loading{
    width:260px;
    height:8px;

    border-radius:50px;
    overflow:hidden;

    background:
    rgba(255,255,255,.12);

    backdrop-filter:blur(10px);

    border:
    1px solid rgba(255,255,255,.1);
}

.loading-bar{
    width:0;
    height:100%;

    background:
    linear-gradient(
    90deg,
    #00e5ff,
    #ffffff,
    #00ff88,
    #00e5ff
    );

    background-size:300%;

    animation:
    loadBar 4s linear forwards,
    shine 1.5s linear infinite;
}

@keyframes shine{
    from{
        background-position:0%;
    }
    to{
        background-position:300%;
    }
}

/* ========================= */
/* FOOTER */
/* ========================= */

.footer{
    position:absolute;
    bottom:30px;
    width:100%;
    text-align:center;

    color:rgba(255,255,255,.85);
}

.footer-logo{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

.footer-item{
    width:90px;
    height:28px;

    display:flex;
    justify-content:center;
    align-items:center;
}

.footer-item img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

.footer-text{
    font-size:12px;
    letter-spacing:.5px;
    line-height:1.7;
    margin-bottom:45px;
}

/* ========================= */
/* ANIMATION */
/* ========================= */

.show-text{
    animation:textShow .8s forwards;
}

.hide-icon{
    animation:iconHide .8s forwards;
}

.load{
    animation:loadBar 4s linear forwards;
}

@keyframes float{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }

}

@keyframes iconHide{

    from{
        opacity:1;
        transform:
        translate(-50%,-50%)
        scale(1);
    }

    to{
        opacity:0;
        transform:
        translate(-50%,-50%)
        scale(1.8);
    }

}

@keyframes textShow{

    from{
        opacity:0;
        transform:
        translate(-50%,-50%)
        scale(.7);
    }

    to{
        opacity:1;
        transform:
        translate(-50%,-50%)
        scale(1);
    }

}

@keyframes loadBar{

    from{
        width:0%;
    }

    to{
        width:100%;
    }

}

.loading-text{
    margin-top:12px;
    color:white;
    font-size:14px;
    opacity:.85;
    letter-spacing:1px;
}

</style>
</head>
<body>

<div class="splash">

    <div class="logo-container">

        <!-- Logo Pertamina Icon -->
        <img
        src="assets/pertamina-icon.png"
        class="logo logo-icon"
        id="logoIcon">

        <!-- Logo Tulisan Pertamina -->
        <img
        src="assets/pertamina-teks.png"
        class="logo logo-text"
        id="logoText">

    </div>

    <div class="loading">
        <div class="loading-bar" id="loadingBar"></div>
    </div>

    <div class="loading-text" id="loadingText">
Memuat Sistem...
</div>

    <div class="footer">

        <div class="footer-logo">

    <div class="footer-item">
        <img src="assets/danantara.png">
    </div>

    <div class="footer-item">
        <img src="assets/bumn.png">
    </div>

</div>

        <div class="footer-text">
            PT Pertamina (Persero)<br>
            Bagian dari Danantara Indonesia dan BUMN Untuk Indonesia
        </div>

    </div>

</div>

<script>

const logoIcon = document.getElementById("logoIcon");
const logoText = document.getElementById("logoText");
const loadingBar = document.getElementById("loadingBar");

/* Logo Icon tampil 1.5 detik */
setTimeout(()=>{

    logoIcon.classList.add("hide-icon");

    setTimeout(()=>{

        logoText.classList.add("show-text");

        loadingBar.classList.add("load");

    },400);

},1500);

const text =
document.getElementById("loadingText");

setTimeout(()=>{
text.innerText =
"Memverifikasi Server...";
},2000);

setTimeout(()=>{
text.innerText =
"Menyiapkan Dashboard...";
},4000);

/* Redirect */
setTimeout(()=>{

document.body.style.transition =
"opacity .8s";

document.body.style.opacity = "0";

setTimeout(()=>{
window.location.href =
"login.html";
},800);

},5200);

</script>

</body>
</html>
