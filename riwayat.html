<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Transaksi</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
180deg,
#03132b 0%,
#06224a 40%,
#0b3f8d 100%
);

min-height:100vh;
padding:20px;
color:white;

}

/* =========================
   HEADER PREMIUM
========================= */
.header{
    text-align:center;
    margin-bottom:22px;
}

.header h2{
    font-size:22px;
    font-weight:800;
    letter-spacing:.4px;
    color:#ffffff;
}

/* =========================
   TABS PREMIUM SEGMENTED
========================= */
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:10px;

    padding:6px;
    border-radius:16px;

    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

/* TAB BUTTON BASE */
.tab-btn{
    flex:1;
    height:42px;

    border:none;
    border-radius:12px;

    background:transparent;

    color:rgba(255,255,255,.7);
    font-weight:700;
    font-size:13px;

    cursor:pointer;

    transition:.2s ease;

    position:relative;
}

/* HOVER EFFECT */
.tab-btn:hover{
    color:#fff;
    background:rgba(255,255,255,.06);
}

/* ACTIVE TAB (premium green pill) */
.tab-btn.active{
    background:linear-gradient(135deg,#00ff88,#00c96a);
    color:#021b12;

    box-shadow:
        0 12px 25px rgba(0,255,136,.25),
        inset 0 1px 0 rgba(255,255,255,.35);
}

/* =========================
   LIST PREMIUM
========================= */
.list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

/* =========================
   CARD PREMIUM
========================= */
.card{
    position:relative;
    overflow:hidden;

    background:rgba(255,255,255,.06);
    backdrop-filter:blur(22px);

    border-radius:18px;
    padding:16px;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:0 15px 35px rgba(0,0,0,.25);

    transition:.2s ease;
}

.card:hover{
    transform:translateY(-2px);
    box-shadow:0 20px 45px rgba(0,0,0,.35);
}

/* SOFT GLOW ACCENT */
.card::before{
    content:"";
    position:absolute;
    top:-40%;
    right:-40%;

    width:200px;
    height:200px;

    background:radial-gradient(
        circle,
        rgba(0,255,136,.15),
        transparent 60%
    );

    transform:rotate(25deg);
}

/* TITLE */
.card h3{
    margin-bottom:8px;
    color:#00ff88;

    font-size:15px;
    letter-spacing:.3px;
}

/* TEXT */
.card p{
    font-size:13px;
    margin:4px 0;

    color:rgba(255,255,255,.75);
}

/* STATUS BASE */
.status{
    display:inline-flex;
    align-items:center;

    padding:5px 10px;

    border-radius:999px;
    font-size:11px;
    font-weight:700;

    margin-top:10px;

    letter-spacing:.3px;
}

/* STATUS ACTIVE */
.aktif{
    background:rgba(0,255,136,.12);
    border:1px solid rgba(0,255,136,.25);
    color:#00ff88;
}

/* STATUS EXPIRED */
.kadaluwarsa{
    background:rgba(255,68,68,.12);
    border:1px solid rgba(255,68,68,.25);
    color:#ff6b6b;
}

/* STATUS SUCCESS */
.berhasil{
    background:rgba(0,255,136,.12);
    border:1px solid rgba(0,255,136,.25);
    color:#00ff88;
}

/* =========================
   BUTTON KEMBALI PREMIUM
========================= */
.kembali{
    width:100%;
    height:52px;

    margin-top:22px;

    border:none;
    border-radius:16px;

    font-size:15px;
    font-weight:800;

    cursor:pointer;

    color:#021b12;

    background:linear-gradient(135deg,#00ff88,#00c96a);

    position:relative;
    overflow:hidden;

    transition:.2s ease;
}

/* efek glow halus */
.kembali::before{
    content:"";
    position:absolute;
    inset:-40%;
    background:radial-gradient(circle,rgba(255,255,255,.25),transparent 60%);
    transform:rotate(20deg);
}

/* hover feel premium */
.kembali:hover{
    transform:translateY(-1px);
    box-shadow:
        0 22px 55px rgba(0,255,136,.35),
        inset 0 1px 0 rgba(255,255,255,.4);
}

.kembali:active{
    transform:scale(.98);
}

.kosong{

text-align:center;

padding:40px 20px;

opacity:.7;

}

</style>
</head>
<body>

<div class="header">
<h2>Riwayat Transaksi</h2>
</div>

<div class="tabs">

<button
class="tab-btn active"
onclick="showDeposit(this)">
Riwayat Deposit / Withdraw
</button>

<button
class="tab-btn"
onclick="showPaket(this)">
Riwayat Paket
</button>

</div>

<div id="list" class="list"></div>

<button
class="kembali"
onclick="history.back()">
Kembali
</button>

<script>

const currentUser =
localStorage.getItem("currentUser");

const user =
JSON.parse(
localStorage.getItem(currentUser)
);

const list =
document.getElementById("list");

// ======================
// RIWAYAT DEPOSIT
// ======================

function showDeposit(btn){

document
.querySelectorAll(".tab-btn")
.forEach(x=>x.classList.remove("active"));

btn.classList.add("active");

list.innerHTML = "";

const deposit =
user.riwayatDeposit || [];

const withdraw =
user.riwayatWithdraw || [];

if(
deposit.length === 0 &&
withdraw.length === 0
){

list.innerHTML = `
<div class="kosong">
Belum ada riwayat deposit / withdraw
</div>
`;

return;

}

const semuaRiwayat = [

...(user.riwayatDeposit || []).map(item => ({
    ...item,
    tipe:"DEPOSIT"
})),

...(user.riwayatWithdraw || []).map(item => ({
    ...item,
    tipe:"WITHDRAW"
}))

];

semuaRiwayat.reverse().forEach(item => {

list.innerHTML += `

<div class="card">

<h3>
${
item.tipe === "DEPOSIT"
?
'<i class="fas fa-wallet"></i> Deposit'
:
'<i class="fas fa-money-bill-wave"></i> Withdraw'
}
</h3>

<p>
Nominal :
Rp ${Number(item.nominal)
.toLocaleString("id-ID")}
</p>

${
item.tipe === "WITHDRAW"
?
`
<p>Bank : ${item.bank}</p>
<p>Rekening : ${item.rekening}</p>
`
:
''
}

<p>
Tanggal :
${item.tanggal}
</p>

<span class="status berhasil">
${item.status || "BERHASIL"}
</span>

</div>

`;

});

}

// ======================
// RIWAYAT PAKET
// ======================

function showPaket(btn){

document
.querySelectorAll(".tab-btn")
.forEach(x=>x.classList.remove("active"));

btn.classList.add("active");

list.innerHTML = "";

let dataPaket = [];


// paket selesai
if(user.riwayatPaket){

user.riwayatPaket.forEach(p => {

dataPaket.push({

nama:p.nama,
modal:p.modal,
saldo:p.totalCair || p.saldoPaket || p.modal,

durasi:p.status === "AKTIF"
? 14
: 0,

status:p.status || "AKTIF"

});

});

}

if(dataPaket.length === 0){

list.innerHTML = `
<div class="kosong">
Belum ada riwayat paket
</div>
`;

return;

}

dataPaket.reverse().forEach(p => {

list.innerHTML += `

<div class="card">

<h3>
<i class="fas fa-chart-line"></i>
${p.nama}
</h3>

<p>
Modal :
Rp ${Number(p.modal)
.toLocaleString("id-ID")}
</p>

<p>
Profit :
Rp ${Number(p.saldo - p.modal).toLocaleString("id-ID")}
</p>

<p>
Total Cair :
Rp ${Number(p.saldo)
.toLocaleString("id-ID")}
</p>

${
p.status === "AKTIF"
?
`<p>Cair Dalam : ${p.durasi}</p>`
:
`<p>Paket telah selesai</p>`
}

<span class="status ${
p.status === "AKTIF"
?
"aktif"
:
"kadaluwarsa"
}">
${p.status}
</span>

</div>

`;

});

}

// tampil awal
showDeposit(
document.querySelector(".tab-btn")
);

</script>

</body>
</html>
