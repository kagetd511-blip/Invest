<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Transaksi</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
180deg,
#03132b 0%,
#06224a 40%,
#0b3f8d 100%
);

min-height:100vh;
padding:20px;
color:white;

}

.header{

text-align:center;
margin-bottom:20px;

}

.header h2{

font-size:24px;
font-weight:bold;

}

.tabs{

display:flex;
gap:10px;
margin-bottom:20px;

}

.tab-btn{

flex:1;

height:45px;

border:none;

border-radius:12px;

background:
rgba(255,255,255,.1);

color:white;

font-weight:bold;

cursor:pointer;

}

.tab-btn.active{

background:#00ff88;
color:#03233e;

}

.list{

display:flex;
flex-direction:column;
gap:12px;

}

.card{

background:
rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:15px;

padding:15px;

border:
1px solid rgba(255,255,255,.08);

}

.card h3{

margin-bottom:8px;
color:#00ff88;

}

.card p{

font-size:14px;
margin:4px 0;

}

.status{

display:inline-block;

padding:5px 10px;

border-radius:999px;

font-size:12px;

font-weight:bold;

margin-top:8px;

}

.aktif{

background:#00ff88;
color:#03233e;

}

.kadaluwarsa{

background:#ff4444;
color:white;

}

.berhasil{

background:#00ff88;
color:#03233e;

}

.kembali{

width:100%;

height:50px;

margin-top:20px;

border:none;

border-radius:12px;

background:#00ff88;

color:#03233e;

font-weight:bold;

cursor:pointer;

}

.kosong{

text-align:center;

padding:40px 20px;

opacity:.7;

}

</style>
</head>
<body>

<div class="header">
<h2>Riwayat Transaksi</h2>
</div>

<div class="tabs">

<button
class="tab-btn active"
onclick="showDeposit(this)">
Riwayat Deposit / Withdraw
</button>

<button
class="tab-btn"
onclick="showPaket(this)">
Riwayat Paket
</button>

</div>

<div id="list" class="list"></div>

<button
class="kembali"
onclick="history.back()">
Kembali
</button>

<script>

const currentUser =
localStorage.getItem("currentUser");

const user =
JSON.parse(
localStorage.getItem(currentUser)
);

const list =
document.getElementById("list");

// ======================
// RIWAYAT DEPOSIT
// ======================

function showDeposit(btn){

document
.querySelectorAll(".tab-btn")
.forEach(x=>x.classList.remove("active"));

btn.classList.add("active");

list.innerHTML = "";

const deposit =
user.riwayatDeposit || [];

const withdraw =
user.riwayatWithdraw || [];

if(
deposit.length === 0 &&
withdraw.length === 0
){

list.innerHTML = `
<div class="kosong">
Belum ada riwayat deposit / withdraw
</div>
`;

return;

}

const semuaRiwayat = [

...(user.riwayatDeposit || []).map(item => ({
    ...item,
    tipe:"DEPOSIT"
})),

...(user.riwayatWithdraw || []).map(item => ({
    ...item,
    tipe:"WITHDRAW"
}))

];

semuaRiwayat.reverse().forEach(item => {

list.innerHTML += `

<div class="card">

<h3>
${
item.tipe === "DEPOSIT"
?
'<i class="fas fa-wallet"></i> Deposit'
:
'<i class="fas fa-money-bill-wave"></i> Withdraw'
}
</h3>

<p>
Nominal :
Rp ${Number(item.nominal)
.toLocaleString("id-ID")}
</p>

${
item.tipe === "WITHDRAW"
?
`
<p>Bank : ${item.bank}</p>
<p>Rekening : ${item.rekening}</p>
`
:
''
}

<p>
Tanggal :
${item.tanggal}
</p>

<span class="status berhasil">
${item.status || "BERHASIL"}
</span>

</div>

`;

});

}

// ======================
// RIWAYAT PAKET
// ======================

function showPaket(btn){

document
.querySelectorAll(".tab-btn")
.forEach(x=>x.classList.remove("active"));

btn.classList.add("active");

list.innerHTML = "";

let dataPaket = [];


// paket selesai
if(user.riwayatPaket){

user.riwayatPaket.forEach(p => {

dataPaket.push({

nama:p.nama,
modal:p.modal,
saldo:p.totalCair || p.saldoPaket || p.modal,

durasi:p.status === "AKTIF"
? 14
: 0,

status:p.status || "AKTIF"

});

});

}

if(dataPaket.length === 0){

list.innerHTML = `
<div class="kosong">
Belum ada riwayat paket
</div>
`;

return;

}

dataPaket.reverse().forEach(p => {

list.innerHTML += `

<div class="card">

<h3>
<i class="fas fa-chart-line"></i>
${p.nama}
</h3>

<p>
Modal :
Rp ${Number(p.modal)
.toLocaleString("id-ID")}
</p>

<p>
Profit :
Rp ${Number(p.saldo - p.modal).toLocaleString("id-ID")}
</p>

<p>
Total Cair :
Rp ${Number(p.saldo)
.toLocaleString("id-ID")}
</p>

${
p.status === "AKTIF"
?
`<p>Cair Dalam : ${p.durasi}</p>`
:
`<p>Paket telah selesai</p>`
}

<span class="status ${
p.status === "AKTIF"
?
"aktif"
:
"kadaluwarsa"
}">
${p.status}
</span>

</div>

`;

});

}

// tampil awal
showDeposit(
document.querySelector(".tab-btn")
);

</script>

</body>
</html>
