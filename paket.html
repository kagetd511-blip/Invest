<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Paket</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    radial-gradient(circle at top, #0b2a5a 0%, #061225 55%, #040812 100%);
    min-height:100vh;
    padding:20px;
    color:white;
}

/* =========================
   LOGO BOX PREMIUM
========================= */
.logo-box{
    width:120px;
    height:120px;

    margin:auto;

    background: linear-gradient(
        135deg,
        rgba(255,255,255,.10),
        rgba(255,255,255,.03)
    );

    border-radius:28px;

    display:flex;
    align-items:center;
    justify-content:center;

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
        0 20px 50px rgba(0,0,0,.6),
        inset 0 1px 0 rgba(255,255,255,.08);
}

.logo-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    padding:6px;
}

/* =========================
   CARD PREMIUM
========================= */
.card{
    margin-top:20px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.08),
        rgba(255,255,255,.03)
    );

    backdrop-filter:blur(22px);

    border-radius:28px;

    padding:20px;

    border:1px solid rgba(255,255,255,.1);

    box-shadow:
        0 25px 60px rgba(0,0,0,.6),
        inset 0 1px 0 rgba(255,255,255,.05);
}

.card h2{
    text-align:center;
    margin-bottom:15px;
    letter-spacing:.5px;
}

/* =========================
   IMAGE PREMIUM
========================= */
.paket-image{
    width:100%;
    height:220px;

    border-radius:22px;
    overflow:hidden;

    margin-bottom:20px;

    border:1px solid rgba(255,255,255,.1);

    box-shadow:0 18px 40px rgba(0,0,0,.5);
}

.paket-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* =========================
   INFO BOX PREMIUM
========================= */
.info{
    display:flex;
    justify-content:space-between;

    margin-bottom:15px;
    padding:14px 16px;

    background:rgba(255,255,255,.05);

    border-radius:14px;

    border:1px solid rgba(255,255,255,.08);
}

.info span{
    color:rgba(255,255,255,.7);
    font-size:12px;
}

.info b{
    color:#00ff88;
    font-weight:700;
}

/* =========================
   SALDO BOX ULTRA LUXURY
========================= */
.saldo-box{
    position:relative;

    width:fit-content;
    min-width:220px;

    margin:0 auto 18px;

    padding:14px 18px;

    border-radius:16px;

    text-align:center;

    color:#031b12;

    background:
    radial-gradient(circle at top left, rgba(255,255,255,.35), transparent 55%),
    linear-gradient(135deg,
        rgba(0,255,136,.95),
        rgba(0,201,83,.88)
    );

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        0 18px 45px rgba(0,0,0,.45),
        0 10px 25px rgba(0,255,136,.25),
        inset 0 1px 0 rgba(255,255,255,.55),
        inset 0 -8px 18px rgba(0,0,0,.08);

    backdrop-filter: blur(14px);

    overflow:hidden;
}

/* subtle shine layer */
.saldo-box::before{
    content:"";
    position:absolute;
    top:-40%;
    left:-30%;
    width:160%;
    height:160%;

    background:linear-gradient(
        120deg,
        transparent 30%,
        rgba(255,255,255,.35),
        transparent 70%
    );

    transform:rotate(25deg);
    opacity:.25;
}

/* optional glow edge */
.saldo-box::after{
    content:"";
    position:absolute;
    inset:0;

    border-radius:16px;

    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.15),
        inset 0 0 25px rgba(0,255,136,.15);

    pointer-events:none;
}

/* text kecil */
.saldo-box small{
    display:block;
    font-size:10px;
    letter-spacing:.8px;
    text-transform:uppercase;
    opacity:.75;
}

/* saldo utama */
.saldo-box h3{
    margin-top:4px;
    font-size:19px;
    font-weight:900;
    letter-spacing:.4px;
    text-shadow:0 2px 10px rgba(0,0,0,.15);
}

/* =========================
   BUY BUTTON ULTRA PREMIUM
========================= */
.buy-btn{
    position:relative;

    width:100%;
    height:56px;

    border:none;
    border-radius:18px;

    font-size:16px;
    font-weight:800;
    letter-spacing:.3px;

    cursor:pointer;

    color:#031b12;

    background:
    linear-gradient(135deg,
        #00ff88,
        #00c95f
    );

    box-shadow:
        0 18px 40px rgba(0,255,136,.28),
        0 8px 20px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.55);

    overflow:hidden;

    transform:translateZ(0);
}

/* glossy highlight layer */
.buy-btn::before{
    content:"";
    position:absolute;
    top:-40%;
    left:-60%;
    width:160%;
    height:160%;

    background:linear-gradient(
        120deg,
        transparent 35%,
        rgba(255,255,255,.35),
        transparent 65%
    );

    transform:rotate(25deg);
    opacity:.25;
}

/* inner border glow */
.buy-btn::after{
    content:"";
    position:absolute;
    inset:0;

    border-radius:18px;

    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.25),
        inset 0 -10px 20px rgba(0,0,0,.12);

    pointer-events:none;
}

/* disabled state premium (not flat) */
.buy-btn:disabled{
    background:
    linear-gradient(135deg,#2a2a2a,#1a1a1a);

    color:rgba(255,255,255,.4);

    box-shadow:
        0 10px 25px rgba(0,0,0,.4),
        inset 0 1px 0 rgba(255,255,255,.05);

    cursor:not-allowed;
}

/* =========================
   BACK BUTTON PREMIUM
========================= */
.back-btn{
    width:100%;
    height:50px;

    margin-top:10px;

    border:none;
    border-radius:16px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.1);

    color:white;

    font-weight:bold;

    cursor:pointer;
}

/* =========================
   POPUP PREMIUM
========================= */
.popup-bg{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.75);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:9999;
}

.popup-bg.active{
    display:flex;
}

.popup-box{
    width:92%;
    max-width:420px;

    background:
    linear-gradient(135deg,#0b2b5c,#07162f);

    border-radius:22px;

    padding:20px;

    border:1px solid rgba(255,255,255,.12);

    box-shadow:0 25px 60px rgba(0,0,0,.6);
}

.popup-box h2{
    text-align:center;
    margin-bottom:15px;
}

.popup-row{
    display:flex;
    justify-content:space-between;

    padding:12px 14px;

    margin-bottom:10px;

    background:rgba(255,255,255,.05);

    border-radius:12px;

    border:1px solid rgba(255,255,255,.08);
}

.popup-row b{
    color:#00ff88;
}

.popup-btn{
position:relative;

    width:100%;
    height:56px;

    border:none;
    border-radius:18px;

    font-size:16px;
    font-weight:800;
    letter-spacing:.3px;

    cursor:pointer;

    color:#031b12;

    background:
    linear-gradient(135deg,
        #00ff88,
        #00c95f
    );

    box-shadow:
        0 18px 40px rgba(0,255,136,.28),
        0 8px 20px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.55);

    overflow:hidden;

    transform:translateZ(0);
}

/* glossy highlight layer */
.popup-btn::before{
    content:"";
    position:absolute;
    top:-40%;
    left:-60%;
    width:160%;
    height:160%;

    background:linear-gradient(
        120deg,
        transparent 35%,
        rgba(255,255,255,.35),
        transparent 65%
    );

    transform:rotate(25deg);
    opacity:.25;
}

/* inner border glow */
.popup-btn::after{
    content:"";
    position:absolute;
    inset:0;

    border-radius:18px;

    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.25),
        inset 0 -10px 20px rgba(0,0,0,.12);

    pointer-events:none;
}

/* disabled state premium (not flat) */
.popup-btn:disabled{
    background:
    linear-gradient(135deg,#2a2a2a,#1a1a1a);

    color:rgba(255,255,255,.4);

    box-shadow:
        0 10px 25px rgba(0,0,0,.4),
        inset 0 1px 0 rgba(255,255,255,.05);

    cursor:not-allowed;
}

/* =========================
   SUCCESS ICON PREMIUM
========================= */
.success-icon{
    width:90px;
    height:90px;

    border-radius:50%;

    background:linear-gradient(135deg,#00ff88,#00c95f);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:50px;

    margin:auto;
    margin-bottom:15px;

    color:#03233e;

    box-shadow:0 15px 35px rgba(0,255,136,.3);
}

/* =========================
   LOADING PREMIUM
========================= */
#buyLoading{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.6);
    backdrop-filter:blur(12px);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    visibility:hidden;

    transition:.25s;
}

#buyLoading.active{
    opacity:1;
    visibility:visible;
}

.loader-circle{
    width:80px;
    height:80px;
    position:relative;
}

.loader-circle::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.15);
}

.loader-circle::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:2px solid transparent;
    border-top:2px solid #00ff88;
    border-right:2px solid #00ff88;
    animation:spin .7s linear infinite;
}

.loader-logo{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:45px;
    height:45px;
}

.loader-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

</style>
</head>
<body>

<div class="logo-box">
<img src="assets/logo.png">
</div>

<div class="card">

<h2 id="namaPaket">
Paket Investasi
</h2>

<div class="paket-image">
<img id="fotoPaket"
src="">
</div>

<div class="saldo-box">

<p>Saldo Tersedia</p>

<h3 id="saldoUser">
Rp 0
</h3>

</div>

<div class="info">
<span>Modal</span>
<b id="modalPaket">
Rp 0
</b>
</div>

<div class="info">
<span>Keuntungan</span>
<b id="profitPaket">
Rp 0 / Hari
</b>
</div>

<div class="info">
<span>Pencairan</span>
<b id="durasiPaket">
14 Hari
</b>
</div>

<button
id="buyBtn"
class="buy-btn">
Beli Paket
</button>

<button
class="back-btn"
onclick="history.back()">
Kembali
</button>

</div>

    <!-- POPUP KONFIRMASI -->
<div id="popupConfirm" class="popup-bg">

<div class="popup-box">

<h2 id="popupTitle">
Konfirmasi Pembelian
</h2>

<div class="popup-row">
<span>Modal</span>
<b id="popupModal"></b>
</div>

<div class="popup-row">
<span>Keuntungan</span>
<b id="popupProfit"></b>
</div>

<div class="popup-row">
<span>Pencairan</span>
<b id="popupDurasi"></b>
</div>

<div class="popup-row">
<span>Saldo Tersedia</span>
<b id="popupSaldo"></b>
</div>

<button
id="btnKonfirmasi"
class="popup-btn">
Konfirmasi Pembelian
</button>

</div>

</div>

<div id="buyLoading">
    <div class="loader-box">
        <div class="loader-circle">
            <div class="loader-logo">
                <img src="assets/logo.png">
            </div>
        </div>
    </div>
</div>

<!-- POPUP BERHASIL -->
<div id="popupSuccess" class="popup-bg">

<div class="popup-box">

<div class="success-icon">
✓
</div>

<h2 style="color:#00ff88">
Pembelian Berhasil!
</h2>

<p id="successText">
Paket telah aktif
</p>

<div class="popup-row">
<span>Modal</span>
<b id="successModal"></b>
</div>

<div class="popup-row">
<span>Keuntungan</span>
<b id="successProfit"></b>
</div>

<div class="popup-row">
<span>Pencairan</span>
<b id="successDurasi"></b>
</div>

<button
id="btnSelesai"
class="popup-btn">
Selesai
</button>

</div>

</div>

<script>

const paketData = {
1:{nama:"Paket 1",modal:416000,profit:"Rp50.000 / Hari",durasi:"14 Hari",gambar:"assets/pakett1.jpg"},
2:{nama:"Paket 2",modal:1200000,profit:"Rp150.000 / Hari",durasi:"14 Hari",gambar:"assets/pakett2.jpg"},
3:{nama:"Paket 3",modal:3500000,profit:"Rp550.000 / Hari",durasi:"14 Hari",gambar:"assets/pakett3.jpg"},
4:{nama:"Paket 4",modal:9600000,profit:"Rp1.600.000 / Hari",durasi:"14 Hari",gambar:"assets/pakett4.jpg"},
5:{nama:"Paket 5",modal:22200000,profit:"Rp4.400.000 / Hari",durasi:"14 Hari",gambar:"assets/pakett5.jpg"},
6:{nama:"Paket 6",modal:45300000,profit:"Rp11.500.000 / Hari",durasi:"14 Hari",gambar:"assets/pakett6.jpg"},
7:{nama:"Paket 7",modal:85600000,profit:"Rp24.000.000 / Hari",durasi:"14 Hari",gambar:"assets/pakett7.jpg"},
8:{nama:"Paket 8",modal:100000000,profit:"Rp30.000.000 / Hari",durasi:"14 Hari",gambar:"assets/pakett8.jpg"}
};

/* =========================
   DATA USER
========================= */
const paketId = localStorage.getItem("selectedPaket");
const paket = paketData[paketId];

const currentUser = localStorage.getItem("currentUser");
const userData = localStorage.getItem(currentUser);

if(!paket){
    alert("Paket tidak ditemukan!");
    throw new Error("paket undefined");
}

if(!currentUser || !userData){
    alert("User tidak ditemukan!");
    throw new Error("user undefined");
}

const user = JSON.parse(userData);

/* =========================
   TAMPIL DATA
========================= */
document.getElementById("namaPaket").innerText = paket.nama;
document.getElementById("fotoPaket").src = paket.gambar;
document.getElementById("modalPaket").innerText = "Rp " + paket.modal.toLocaleString("id-ID");
document.getElementById("profitPaket").innerText = paket.profit;
document.getElementById("durasiPaket").innerText = paket.durasi;

document.getElementById("saldoUser").innerText =
"Rp " + Number(user.saldo).toLocaleString("id-ID");

/* =========================
   BUTTON BELI
========================= */
const buyBtn = document.getElementById("buyBtn");

if(user.saldo < paket.modal){
    buyBtn.disabled = true;
    buyBtn.innerText = "Saldo Tidak Cukup";
} else {
    buyBtn.onclick = () => {

        document.getElementById("popupTitle").innerText =
            "Konfirmasi Pembelian " + paket.nama;

        document.getElementById("popupModal").innerText =
            "Rp " + paket.modal.toLocaleString("id-ID");

        document.getElementById("popupProfit").innerText =
            paket.profit;

        document.getElementById("popupDurasi").innerText =
            paket.durasi;

        document.getElementById("popupSaldo").innerText =
            "Rp " + Number(user.saldo).toLocaleString("id-ID");

        document.getElementById("popupConfirm").classList.add("active");
    };
}

/* =========================
   KONFIRMASI BELI
========================= */
document.getElementById("btnKonfirmasi").onclick = () => {

    document.getElementById("popupConfirm").classList.remove("active");

    // loading logo only
    document.getElementById("buyLoading").classList.add("active");

    setTimeout(() => {

        document.getElementById("buyLoading").classList.remove("active");

        // proses saldo
        user.saldo -= paket.modal;

        if(!user.paketAktif) user.paketAktif = [];
        if(!user.riwayatPaket) user.riwayatPaket = [];

        user.riwayatPaket.unshift({
            nama: paket.nama,
            modal: paket.modal,
            profit: paket.profit,
            tanggal: new Date().toLocaleString("id-ID"),
            status: "AKTIF"
        });

        user.paketAktif.push({
            id: Number(paketId),
            nama: paket.nama,
            modal: paket.modal,
            saldoPaket: paket.modal,
            profit: paket.profit,
            gambar: paket.gambar,
            durasi: 14,
            hariBerjalan: 0,
            lastTick: Date.now()
        });

        localStorage.setItem(
    currentUser,
    JSON.stringify(user)
);

        // ===== isi popup success (INI YANG KURANG DI KAMU) =====
        document.getElementById("successModal").innerText =
            "Rp " + paket.modal.toLocaleString("id-ID");

        document.getElementById("successProfit").innerText =
            paket.profit;

        document.getElementById("successDurasi").innerText =
            paket.durasi;

        document.getElementById("popupSuccess").classList.add("active");

    }, 1500);
};

/* =========================
   SELESAI → LOADING → DASHBOARD
========================= */
document.getElementById("btnSelesai").onclick = () => {

    document.getElementById("popupSuccess").classList.remove("active");

    document.getElementById("buyLoading").classList.add("active");

    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 1200);
};
    
</script>

</body>
</html>
