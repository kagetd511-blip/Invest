<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Paket</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
180deg,
#03132b 0%,
#06224a 40%,
#0b3f8d 100%
);

min-height:100vh;

padding:20px;

color:white;

}

.logo-box{

width:120px;
height:120px;

margin:auto;

background:rgba(255,255,255,.08);

border-radius:25px;

overflow:hidden;

display:flex;

align-items:center;

justify-content:center;

}

.logo-box img{

width:100%;
height:100%;
object-fit:contain;

padding:10px;

}

.card{

margin-top:20px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:25px;

padding:20px;

border:1px solid rgba(255,255,255,.1);

}

.card h2{

text-align:center;

margin-bottom:15px;

}

.paket-image{

width:100%;
height:220px;

border-radius:20px;

overflow:hidden;

margin-bottom:20px;

}

.paket-image img{

width:100%;
height:100%;
object-fit:fill;

}

.info{

display:flex;

justify-content:space-between;

margin-bottom:15px;

padding:14px;

background:rgba(255,255,255,.06);

border-radius:12px;

}

.info span{

color:rgba(255,255,255,.7);

}

.info b{

color:#00ff88;

}

.saldo-box{

background:
linear-gradient(
135deg,
#00ff88,
#00c95f
);

padding:15px;

border-radius:15px;

color:#03233e;

text-align:center;

margin-bottom:20px;

}

.saldo-box h3{

margin-top:5px;

font-size:24px;

}

.buy-btn{

width:100%;

height:55px;

border:none;

border-radius:15px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
135deg,
#00ff88,
#00c95f
);

color:#03233e;

}

.buy-btn:disabled{

background:#666;

color:white;

cursor:not-allowed;

}

.back-btn{

width:100%;

height:50px;

margin-top:10px;

border:none;

border-radius:15px;

background:#1f4ea8;

color:white;

font-weight:bold;

cursor:pointer;

}

</style>
</head>
<body>

<div class="logo-box">
<img src="assets/logo.png">
</div>

<div class="card">

<h2 id="namaPaket">
Paket Investasi
</h2>

<div class="paket-image">
<img id="fotoPaket"
src="">
</div>

<div class="saldo-box">

<p>Saldo Tersedia</p>

<h3 id="saldoUser">
Rp 0
</h3>

</div>

<div class="info">
<span>Modal</span>
<b id="modalPaket">
Rp 0
</b>
</div>

<div class="info">
<span>Keuntungan</span>
<b id="profitPaket">
Rp 0 / Hari
</b>
</div>

<div class="info">
<span>Pencairan</span>
<b id="durasiPaket">
14 Hari
</b>
</div>

<button
id="buyBtn"
class="buy-btn">
Beli Paket
</button>

<button
class="back-btn"
onclick="history.back()">
Kembali
</button>

</div>

<script>

const paketData = {

1:{
nama:"Paket 1",
modal:416000,
profit:"Rp50.000 / Hari",
durasi:"14 Hari",
gambar:"assets/pakett1.jpg"
},

2:{
nama:"Paket 2",
modal:1200000,
profit:"Rp150.000 / Hari",
durasi:"14 Hari",
gambar:"assets/pakett2.jpg"
},

3:{
nama:"Paket 3",
modal:3500000,
profit:"Rp550.000 / Hari",
durasi:"14 Hari",
gambar:"assets/pakett3.jpg"
},

4:{
nama:"Paket 4",
modal:9600000,
profit:"Rp1.600.000 / Hari",
durasi:"14 Hari",
gambar:"assets/pakett4.jpg"
},

5:{
nama:"Paket 5",
modal:22200000,
profit:"Rp4.400.000 / Hari",
durasi:"14 Hari",
gambar:"assets/pakett5.jpg"
},

6:{
nama:"Paket 6",
modal:45300000,
profit:"Rp11.500.000 / Hari",
durasi:"14 Hari",
gambar:"assets/pakett6.jpg"
},

7:{
nama:"Paket 7",
modal:85600000,
profit:"Rp24.000.000 / Hari",
durasi:"14 Hari",
gambar:"assets/pakett7.jpg"
}

};

const paketId =
localStorage.getItem("selectedPaket");

const paket =
paketData[paketId];

document.getElementById(
"namaPaket"
).innerText =
paket.nama;

document.getElementById(
"fotoPaket"
).src =
paket.gambar;

document.getElementById(
"modalPaket"
).innerText =
"Rp " +
paket.modal.toLocaleString("id-ID");

document.getElementById(
"profitPaket"
).innerText =
paket.profit;

document.getElementById(
"durasiPaket"
).innerText =
paket.durasi;

const currentUser =
localStorage.getItem(
"currentUser"
);

const user =
JSON.parse(
localStorage.getItem(
currentUser
)
);

document.getElementById(
"saldoUser"
).innerText =
"Rp " +
Number(user.saldo)
.toLocaleString("id-ID");

const buyBtn =
document.getElementById(
"buyBtn"
);

if(user.saldo < paket.modal){

buyBtn.disabled = true;

buyBtn.innerText =
"Saldo Tidak Cukup";

}else{

buyBtn.onclick = () => {

if(confirm(
"Beli paket ini?"
)){

user.saldo =
Number(user.saldo)
- paket.modal;

/* SIMPAN PAKET AKTIF */
if(!user.paketAktif){
    user.paketAktif = [];
}

user.paketAktif.push({

    id:Number(paketId),

    nama:paket.nama,

    modal:paket.modal,

    saldoPaket:paket.modal,

    profit:paket.profit,

    gambar:paket.gambar,

    durasi:14,

    hariBerjalan:0,

    terakhirUpdate:
    new Date().toDateString()

});

localStorage.setItem(
currentUser,
JSON.stringify(user)
);

alert(
"Pembelian berhasil"
);

window.location.href =
"dashboard.html";

}

};

}

</script>

</body>
</html>
