<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proses Pembayaran</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    text-align:center;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:18px;
    background:#0f172a;
    border-bottom:1px solid #1f2a44;
}

.header img{
    width:40px;
}

/* CARD */
.card{
    margin:15px;
    background:linear-gradient(135deg,#111b2e,#0f172a);
    padding:18px;
    border-radius:16px;
    border:1px solid #1f2a44;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* TIMER */
.timer{
    font-size:18px;
    font-weight:bold;
    color:#fbbf24;
    margin-bottom:8px;
}

/* STATUS */
.status{
    font-size:14px;
    color:#94a3b8;
    margin-bottom:10px;
}

/* NOMINAL */
.amount{
    font-size:22px;
    font-weight:bold;
    color:#00ff88;
    margin:10px 0;
}

/* BOX */
.box{
    background:#0f172a;
    padding:12px;
    border-radius:12px;
    margin-top:12px;
    font-size:14px;
    border:1px solid #24324d;
    text-align:left;
}

/* QR */
.qr img{
    width:180px;
    margin-top:10px;
    border-radius:12px;
    box-shadow:0 10px 20px rgba(0,255,136,0.15);
}

/* BANK */
.bank-title{
    color:#00ff88;
    font-weight:bold;
    margin-bottom:10px;
}

.bank-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #1f2a44;
    font-size:14px;
}

.bank-item:last-child{
    border-bottom:none;
}

.bank-label{
    color:#94a3b8;
}

.bank-value{
    font-weight:bold;
}

/* BADGE */
.badge{
    display:inline-block;
    padding:4px 10px;
    font-size:12px;
    background:#00ff88;
    color:#0b1220;
    border-radius:8px;
    margin-bottom:10px;
    font-weight:bold;
}

/* BUTTON */
.btn{
    width:90%;
    max-width:300px;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.03);
}

.btn-check{
    background:#00ff88;
    color:#0b1220;
    box-shadow:0 0 15px rgba(0,255,136,0.2);
}

.btn-cancel{
    background:#334155;
    color:white;
}

/* TOAST */
.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#00ff88;
    color:#0b1220;
    padding:10px 16px;
    border-radius:10px;
    font-weight:bold;
    z-index:9999;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="header">
    <img src="assets/logo.png">
    <h3>Konfirmasi Pembayaran</h3>
</div>

<div class="card">

    <div class="timer" id="timer">04:00:00</div>
    <div class="status" id="status">Menunggu pembayaran...</div>

    <div class="amount" id="nominal">Rp 0</div>

    <div id="info"></div>

</div>

<div class="card">

    <div class="box">
        ⚠️ Silakan transfer sesuai nominal yang tertera
    </div>

    <button class="btn btn-check" onclick="cekPembayaran()">
        Cek Pembayaran
    </button>

    <button class="btn btn-cancel" onclick="batal()">
        Batalkan
    </button>

</div>

<script>
let data = JSON.parse(localStorage.getItem("topupData"));

if(!data){
    window.location.href = "tambahsaldo.html";
}

/* NOMINAL */
document.getElementById("nominal").innerText =
"Rp " + data.nominal.toLocaleString("id-ID");

/* METHOD DISPLAY */
let info = document.getElementById("info");

if(data.method === "QRIS"){
    info.innerHTML = `
        <div class="badge">QRIS PAYMENT</div>
        <div class="qr">
            <img src="assets/qris.png">
        </div>
    `;
}else{

    let bankName = data.method === "BRI" ? "BRI" : "BCA";
    let rek = data.method === "BRI" ? "1234567890" : "0987654321";

    info.innerHTML = `
        <div class="badge">TRANSFER BANK</div>

        <div class="box">
            <div class="bank-title">${bankName}</div>

            <div class="bank-item">
                <span class="bank-label">No Rekening</span>
                <span class="bank-value">${rek}</span>
            </div>

            <div class="bank-item">
                <span class="bank-label">Atas Nama</span>
                <span class="bank-value">PT Digital Indo</span>
            </div>
        </div>
    `;
}

/* TIMER 4 JAM */
let timeLeft = 4 * 60 * 60;

function update(){
    let h = Math.floor(timeLeft/3600);
    let m = Math.floor((timeLeft%3600)/60);
    let s = timeLeft%60;

    document.getElementById("timer").innerText =
    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

    timeLeft--;
}

setInterval(update,1000);
update();

/* TOAST */
function toast(msg){
    let t = document.createElement("div");
    t.className = "toast";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

/* CEK PEMBAYARAN */
function cekPembayaran(){

    document.getElementById("status").innerText = "Mengecek pembayaran...";

    setTimeout(() => {

        let success = Math.random() > 0.3;

        if(success){

            let key = localStorage.getItem("currentUser");
            let user = JSON.parse(localStorage.getItem(key));

            user.saldo += data.nominal;

            if(!user.riwayatDeposit){
                user.riwayatDeposit = [];
            }

            user.riwayatDeposit.unshift({
                nominal:data.nominal,
                metode:data.method,
                tanggal:new Date().toLocaleString("id-ID")
            });

            localStorage.setItem(key, JSON.stringify(user));

            document.getElementById("status").innerText =
            "Pembayaran berhasil ✔";

            toast("Saldo masuk +Rp " + data.nominal.toLocaleString("id-ID"));

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);

        }else{
            document.getElementById("status").innerText =
            "Pembayaran belum ditemukan ❌";
            toast("Pembayaran belum terdeteksi");
        }

    }, 1500);
}

/* BATAL */
function batal(){
    localStorage.removeItem("topupData");
    window.location.href = "tambahsaldo.html";
}
</script>

</body>
</html>
