<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proses Pembayaran</title>

<style>

/* =========================
   GLOBAL PREMIUM BASE
========================= */
body{
    margin:0;
    font-family:Arial, sans-serif;

    background:
    radial-gradient(circle at top, #0b1a33 0%, #070b14 60%, #05070d 100%);

    color:white;
    text-align:center;
}

/* =========================
   HEADER PREMIUM
========================= */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    padding:18px;

    background:rgba(15,23,42,.85);
    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(255,255,255,.06);

    box-shadow:0 10px 30px rgba(0,0,0,.5);
    position:sticky;
    top:0;
    z-index:10;
}

.header img{
    width:42px;
    filter:drop-shadow(0 6px 12px rgba(0,255,136,.15));
}

/* =========================
   CARD PREMIUM
========================= */
.card{
    margin:16px;
    padding:18px;

    background:linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02));

    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;

    box-shadow:0 18px 50px rgba(0,0,0,.55);

    backdrop-filter:blur(18px);
}

/* =========================
   TIMER PREMIUM
========================= */
.timer{
    font-size:18px;
    font-weight:800;
    color:#fbbf24;
    margin-bottom:8px;

    text-shadow:0 0 12px rgba(251,191,36,.15);
}

/* =========================
   STATUS PREMIUM
========================= */
.status{
    font-size:13px;
    color:rgba(255,255,255,.65);
    margin-bottom:10px;
}

/* =========================
   AMOUNT PREMIUM
========================= */
.amount{
    font-size:24px;
    font-weight:900;
    color:#00ff88;

    text-shadow:0 0 15px rgba(0,255,136,.25);
}

/* =========================
   BOX PREMIUM
========================= */
.box{
    background:rgba(255,255,255,.03);
    padding:14px;

    border-radius:14px;
    margin-top:12px;

    font-size:14px;

    border:1px solid rgba(255,255,255,.08);

    text-align:left;

    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}

/* =========================
   QR PREMIUM
========================= */
.qr img{
    width:180px;
    margin-top:12px;

    border-radius:14px;

    box-shadow:
        0 15px 35px rgba(0,255,136,.15),
        0 10px 25px rgba(0,0,0,.4);
}

/* =========================
   BANK SECTION PREMIUM
========================= */
.bank-title{
    color:#00ff88;
    font-weight:800;
    margin-bottom:10px;
    letter-spacing:.3px;
}

.bank-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;

    border-bottom:1px solid rgba(255,255,255,.06);

    font-size:14px;
}

.bank-label{
    color:rgba(255,255,255,.6);
}

.bank-value{
    font-weight:700;
    color:white;
}

/* =========================
   BADGE PREMIUM
========================= */
.badge{
    display:inline-block;
    padding:5px 12px;

    font-size:12px;
    font-weight:800;

    background:linear-gradient(135deg,#00ff88,#00c26a);
    color:#04130c;

    border-radius:10px;

    box-shadow:0 10px 20px rgba(0,255,136,.2);
}

/* =========================
   BUTTON PREMIUM
========================= */
.btn{
    width:90%;
    max-width:320px;

    padding:13px;
    margin-top:12px;

    border:none;
    border-radius:14px;

    font-weight:800;
    cursor:pointer;

    transition:.2s ease;
}

/* CHECK BUTTON */
.btn-check{
    background:linear-gradient(135deg,#00ff88,#00c26a);
    color:#04130c;

    box-shadow:
        0 12px 30px rgba(0,255,136,.25),
        inset 0 1px 0 rgba(255,255,255,.3);
}

/* CANCEL BUTTON */
.btn-cancel{
    background:rgba(255,255,255,.06);
    color:white;

    border:1px solid rgba(255,255,255,.08);
}

/* HOVER EFFECT */
.btn:hover{
    transform:translateY(-2px);
}

/* =========================
   TOAST PREMIUM
========================= */
.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);

    background:rgba(0,255,136,.95);
    color:#04130c;

    padding:10px 16px;

    border-radius:12px;

    font-weight:800;

    box-shadow:0 15px 35px rgba(0,0,0,.35);

    z-index:9999;
}
    
</style>
</head>

<body>

<div class="header">
    <img src="assets/logo.png">
    <h3>Konfirmasi Pembayaran</h3>
</div>

<div class="card">

    <div class="timer" id="timer">04:00:00</div>
    <div class="status" id="status">Menunggu pembayaran...</div>

    <div class="amount" id="nominal">Rp 0</div>

    <div id="info"></div>

</div>

<div class="card">

    <div class="box">
        ⚠️ Silakan transfer sesuai nominal yang tertera
    </div>

    <button class="btn btn-check" onclick="cekPembayaran()">
        Cek Pembayaran
    </button>

    <button class="btn btn-cancel" onclick="batal()">
        Batalkan
    </button>

</div>

<script src="utils.js"></script>
<script>
let data = JSON.parse(localStorage.getItem("topupData"));

if(!data){
    window.location.href = "tambahsaldo.html";
}

/* NOMINAL */
document.getElementById("nominal").innerText =
"Rp " + data.nominal.toLocaleString("id-ID");

/* METHOD DISPLAY */
let info = document.getElementById("info");

if(data.method === "QRIS"){
    info.innerHTML = `
        <div class="badge">QRIS PAYMENT</div>
        <div class="qr">
            <img src="assets/qris.png">
        </div>
    `;
}else{

    let bankName = data.method === "BRI" ? "BRI" : "BCA";
    let rek = data.method === "BRI" ? "1234567890" : "0987654321";

    info.innerHTML = `
        <div class="badge">TRANSFER BANK</div>

        <div class="box">
            <div class="bank-title">${bankName}</div>

            <div class="bank-item">
                <span class="bank-label">No Rekening</span>
                <span class="bank-value">${rek}</span>
            </div>

            <div class="bank-item">
                <span class="bank-label">Atas Nama</span>
                <span class="bank-value">PT Digital Indo</span>
            </div>
        </div>
    `;
}

/* TIMER 4 JAM */
let timeLeft = 4 * 60 * 60;

function update(){
    let h = Math.floor(timeLeft/3600);
    let m = Math.floor((timeLeft%3600)/60);
    let s = timeLeft%60;

    document.getElementById("timer").innerText =
    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

    timeLeft--;
}

setInterval(update,1000);
update();

/* TOAST */
function toast(msg){
    let t = document.createElement("div");
    t.className = "toast";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

/* CEK PEMBAYARAN */
function cekPembayaran(){

    document.getElementById("status").innerText = "Mengecek pembayaran...";

    setTimeout(() => {

        let success = Math.random() > 0.3;

        if(success){

            let key = localStorage.getItem("currentUser");
            let user = JSON.parse(localStorage.getItem(key));

            user.saldo += data.nominal;

            if(!user.riwayatDeposit){
                user.riwayatDeposit = [];
            }

            user.riwayatDeposit.unshift({
                nominal:data.nominal,
                metode:data.method,
                tanggal:new Date().toLocaleString("id-ID")
            });

            localStorage.setItem(key, JSON.stringify(user));

           sendMessage(
    "success",
    "Deposit Rp " + data.nominal.toLocaleString("id-ID") + " telah dikonfirmasi dan masuk ke saldo"
);

            document.getElementById("status").innerText =
            "Pembayaran berhasil ✔";

            toast("Saldo masuk +Rp " + data.nominal.toLocaleString("id-ID"));

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);

        }else{
            document.getElementById("status").innerText =
            "Pembayaran belum ditemukan ❌";
            toast("Pembayaran belum terdeteksi");
        }

    }, 1500);
}

/* BATAL */
function batal(){
    localStorage.removeItem("topupData");
    window.location.href = "tambahsaldo.html";
}
</script>

</body>
</html>
