<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proses Pembayaran</title>

<style>

/* =========================
   GLOBAL PREMIUM BASE
========================= */
body{
    margin:0;
    font-family:Arial, sans-serif;

    background:
    radial-gradient(circle at top, #0b1a33 0%, #070b14 60%, #05070d 100%);

    color:white;
    text-align:center;
}

/* =========================
   HEADER PREMIUM
========================= */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    padding:18px;

    background:rgba(15,23,42,.85);
    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(255,255,255,.06);

    box-shadow:0 10px 30px rgba(0,0,0,.5);
    position:sticky;
    top:0;
    z-index:10;
}

.header img{
    width:42px;
    filter:drop-shadow(0 6px 12px rgba(0,255,136,.15));
}

/* =========================
   CARD PREMIUM
========================= */
.card{
    margin:16px;
    padding:18px;

    background:linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02));

    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;

    box-shadow:0 18px 50px rgba(0,0,0,.55);

    backdrop-filter:blur(18px);
}

/* =========================
   TIMER PREMIUM
========================= */
.timer{
    font-size:18px;
    font-weight:800;
    color:#fbbf24;
    margin-bottom:8px;

    text-shadow:0 0 12px rgba(251,191,36,.15);
}

/* =========================
   STATUS PREMIUM
========================= */
.status{
    font-size:13px;
    color:rgba(255,255,255,.65);
    margin-bottom:10px;
}

/* =========================
   AMOUNT PREMIUM
========================= */
.amount{
    font-size:24px;
    font-weight:900;
    color:#00ff88;

    text-shadow:0 0 15px rgba(0,255,136,.25);
}

/* =========================
   BOX PREMIUM
========================= */
.box{
    background:rgba(255,255,255,.03);
    padding:14px;

    border-radius:14px;
    margin-top:12px;

    font-size:14px;

    border:1px solid rgba(255,255,255,.08);

    text-align:left;

    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}

/* =========================
   QR PREMIUM
========================= */
.qr img{
    width:180px;
    margin-top:12px;

    border-radius:14px;

    box-shadow:
        0 15px 35px rgba(0,255,136,.15),
        0 10px 25px rgba(0,0,0,.4);
}

/* =========================
   BANK SECTION PREMIUM
========================= */
.bank-title{
    color:#00ff88;
    font-weight:800;
    margin-bottom:10px;
    letter-spacing:.3px;
}

.bank-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;

    border-bottom:1px solid rgba(255,255,255,.06);

    font-size:14px;
}

.bank-label{
    color:rgba(255,255,255,.6);
}

.bank-value{
    font-weight:700;
    color:white;
}

/* =========================
   BADGE PREMIUM
========================= */
.badge{
    display:inline-block;
    padding:5px 12px;

    font-size:12px;
    font-weight:800;

    background:linear-gradient(135deg,#00ff88,#00c26a);
    color:#04130c;

    border-radius:10px;

    box-shadow:0 10px 20px rgba(0,255,136,.2);
}

/* =========================
   BUTTON PREMIUM
========================= */
.btn{
    width:90%;
    max-width:320px;

    padding:13px;
    margin-top:12px;

    border:none;
    border-radius:14px;

    font-weight:800;
    cursor:pointer;

    transition:.2s ease;
}

/* CHECK BUTTON */
.btn-check{
    background:linear-gradient(135deg,#00ff88,#00c26a);
    color:#04130c;

    box-shadow:
        0 12px 30px rgba(0,255,136,.25),
        inset 0 1px 0 rgba(255,255,255,.3);
}

/* CANCEL BUTTON */
.btn-cancel{
    background:rgba(255,255,255,.06);
    color:white;

    border:1px solid rgba(255,255,255,.08);
}

/* HOVER EFFECT */
.btn:hover{
    transform:translateY(-2px);
}

/* =========================
   TOAST PREMIUM
========================= */
.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);

    background:rgba(0,255,136,.95);
    color:#04130c;

    padding:10px 16px;

    border-radius:12px;

    font-weight:800;

    box-shadow:0 15px 35px rgba(0,0,0,.35);

    z-index:9999;
}
    
</style>
</head>

<body>

<div class="header">
    <img src="assets/logo.png">
    <h3>Konfirmasi Pembayaran</h3>
</div>

<div class="card">

    <div class="timer" id="timer">04:00:00</div>
    <div class="status" id="status">Menunggu pembayaran...</div>

    <div class="amount" id="nominal">Rp 0</div>

    <div id="info"></div>

</div>

<div class="card">

    <div class="box">
        ⚠️ Silakan transfer sesuai nominal yang tertera
    </div>

    <button class="btn btn-check" onclick="cekPembayaran()">
        Cek Pembayaran
    </button>

   <button
class="btn btn-check"
onclick="kirimBukti()">

📤 Kirim Bukti Transfer

</button>

    <button class="btn btn-cancel" onclick="batal()">
        Batalkan
    </button>

</div>

<script src="utils.js"></script>
<script>
let data = JSON.parse(localStorage.getItem("topupData"));

if(!data){
    window.location.href = "tambahsaldo.html";
}

/* NOMINAL */
if(data.method === "QRIS"){

    document.getElementById("nominal").innerText =
    "Rp " + data.nominal.toLocaleString("id-ID");

}else{

    document.getElementById("nominal").innerText =
    "Menunggu nominal...";
}

/* METHOD DISPLAY */
let info = document.getElementById("info");

if(data.method === "QRIS"){
    info.innerHTML = `
        <div class="badge">QRIS PAYMENT</div>
        <div class="qr">
            <img src="assets/qris.png">
        </div>
    `;
}else{

    let bankName = data.method === "BRI" ? "BRI" : "BCA";
    let rek = data.method === "BRI" ? "1234567890" : "0987654321";

    info.innerHTML = `
<div id="bankBox" style="display:none;">

    <div class="badge">
        TRANSFER BANK
    </div>

    <div class="box">

        <div class="bank-title">
            ${bankName}
        </div>

        <div class="bank-item">
            <span class="bank-label">
                No Rekening
            </span>

            <span class="bank-value">
                ${rek}
            </span>
        </div>

        <div class="bank-item">
            <span class="bank-label">
                Atas Nama
            </span>

            <span class="bank-value">
                PT Digital Indo
            </span>
        </div>

    </div>

</div>
`;
   
}

/* TIMER 4 JAM */
let expiredAt =
localStorage.getItem(
    "expiredAt_" + data.topupId
);

if(!expiredAt){

    expiredAt =
    Date.now() + (4 * 60 * 60 * 1000);

    localStorage.setItem(
        "expiredAt_" + data.topupId,
        expiredAt
    );
}

function update(){

    let sisa =
    Math.floor(
        (Number(expiredAt) - Date.now())
        / 1000
    );

    if(sisa <= 0){

        document.getElementById("timer")
        .innerText = "00:00:00";

        document.getElementById("status")
        .innerText = "Pembayaran Kadaluarsa";

        return;
    }

    let h = Math.floor(sisa / 3600);
    let m = Math.floor((sisa % 3600) / 60);
    let s = sisa % 60;

    document.getElementById("timer").innerText =
    `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

setInterval(update,1000);
update();

async function cekNominalFlip(){

    if(data.method === "QRIS") return;

    try{

        let res = await fetch(
            "https://invest-production-dfd6.up.railway.app/topup-status/" +
            data.topupId
        );

        let result = await res.json();

        if(
            result.status &&
            result.topup.nominalUnik > 0
        ){

           document.getElementById("bankBox")
.style.display = "block";

            document.getElementById("nominal").innerText =
            "Rp " +
            Number(result.topup.nominalUnik)
            .toLocaleString("id-ID");

            document.getElementById("status").innerText =
            "Silakan transfer sesuai nominal";

        }else{

            document.getElementById("status").innerText =
            "Menunggu nominal diterbitkan...";
        }

    }catch(err){
        console.log(err);
    }
}

cekNominalFlip();
setInterval(cekNominalFlip,3000);

/* TOAST */
function toast(msg){
    let t = document.createElement("div");
    t.className = "toast";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

/* CEK PEMBAYARAN */
async function cekPembayaran(){

    document.getElementById("status").innerText =
    "Mengecek status pembayaran...";

    try{
        let res = await fetch(
            "https://invest-production-dfd6.up.railway.app/topup-status/" + data.topupId
        );

        let result = await res.json();

        if(!result.status){
            document.getElementById("status").innerText =
            "Data topup tidak ditemukan ❌";
            return;
        }

        if(result.topup.status === "success"){

            sendMessage(
    "success",

`✅ TOP UP BERHASIL

━━━━━━━━━━━━━━

💰 Nominal    : Rp ${
Number(
result.topup.nominalUnik || data.nominal
).toLocaleString("id-ID")
}
📥 Status     : Berhasil Dikonfirmasi

━━━━━━━━━━━━━━

🎉 Dana telah berhasil masuk ke saldo utama Anda.

Silakan gunakan saldo untuk melakukan pembelian paket investasi atau transaksi lainnya.

Terima kasih telah menggunakan layanan kami.`
);
            document.getElementById("status").innerText =
            "Pembayaran berhasil ✔";

            toast(
    "Saldo masuk +Rp " +
    Number(
        result.topup.nominalUnik || data.nominal
    ).toLocaleString("id-ID")
);

            localStorage.removeItem("topupData");

localStorage.removeItem(
    "expiredAt_" + data.topupId
);

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);

        }else{
            document.getElementById("status").innerText =
            "Pembayaran masih pending ⏳";
            toast("Menunggu konfirmasi admin");
        }

    }catch(err){
        document.getElementById("status").innerText =
        "Gagal mengecek server ❌";
        toast("Server tidak merespon");
    }
}

function kirimBukti(){

    toast(
        "Silakan kirim bukti transfer"
    );

}
   
/* BATAL */
function batal(){

    localStorage.removeItem("topupData");

    localStorage.removeItem(
        "expiredAt_" + data.topupId
    );

    window.location.href =
    "tambahsaldo.html";
}
</script>

</body>
</html>
